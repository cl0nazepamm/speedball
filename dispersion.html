<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SPEEDBALL — Glass Dispersion · Spotlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/concrete_connect.css">
<style>
  :root { --mono: 'JetBrains Mono', ui-monospace, "Cascadia Code", Menlo, monospace; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a1a; color: #111;
    font: 12px/1.5 var(--mono); }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }

  #hud { position: fixed; left: 14px; top: 12px; pointer-events: none; max-width: 48ch; z-index: 10;
    color: #f2f2f2; text-shadow: 0 1px 2px #000, 0 0 2px #000c; }
  #hud .title { font: 800 13px/1.5 Verdana, system-ui, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
  #hud .sub { color: #d6d6d6; }
  #hud a { color: #9ec8ff; pointer-events: auto; text-decoration: none; }
  #hud a:hover { text-decoration: underline; }

  #status { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    padding: 14px 22px; color: #111; white-space: pre; text-align: center;
    background: linear-gradient(to bottom, #eeeeee, #b8b8b8); border: 1px solid #242424; border-radius: 6px;
    box-shadow: 6px 8px 20px rgba(0,0,0,0.45), inset 1px 1px 2px rgba(255,255,255,0.9);
    font: 700 11px/1.5 var(--mono); text-shadow: 1px 1px 0 #fff; }
  #status.err { border-color: #6b2330; color: #7a0e1c; background: linear-gradient(to bottom, #f0dede, #cc9a9a); text-shadow: none; }
  #status.hide { display: none; }

  .lil-gui { --width: 300px; --font-size: 11px;
    --background-color: #cccccc; --text-color: #141414;
    --title-background-color: #b8b8b8; --title-text-color: #050505;
    --widget-color: #909090; --hover-color: #9e9e9e; --focus-color: #ababab;
    --number-color: #0b3d6b; --string-color: #3a5f2a;
    --font-family: Verdana, system-ui, sans-serif; --font-family-mono: var(--mono);
    --widget-height: 20px; }
  .lil-gui.root { border: 1px solid #242424; border-radius: 8px 8px 3px 3px;
    background: linear-gradient(to bottom, #e4e4e4, #bcbcbc);
    box-shadow: 7px 9px 24px rgba(0,0,0,0.48), inset 1px 1px 2px rgba(255,255,255,0.96); }
  .lil-gui.root > .title { background: linear-gradient(to bottom, #d9d9d9 0%, #bdbdbd 44%, #8f8f8f 50%, #b8b8b8 100%);
    border-bottom: 1px solid #555; color: #050505; text-shadow: 1px 1px 0 #fff;
    font: 800 11px/1 Verdana, system-ui, sans-serif; letter-spacing: 0.10em; text-transform: uppercase; }

  @media (max-width: 700px), (max-height: 560px) {
    #hud { left: 10px; top: max(8px, env(safe-area-inset-top)); max-width: calc(100vw - 20px); }
    #hud .sub { display: none; }
    .lil-gui { --width: calc(100vw - 16px); }
    .lil-gui.root {
      position: fixed !important;
      left: 8px !important; right: 8px !important; top: auto !important;
      bottom: calc(8px + env(safe-area-inset-bottom, 0px)) !important;
      width: auto !important; max-height: min(40vh, 420px); overflow-y: auto;
    }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.tsl.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/",
    "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.10/build/index.module.js"
  },
  "scopes": {
    "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.10/": { "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js" }
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="title">Glass Dispersion</div>
  <span class="sub">raster glass + photon caustics · spotlight · drag to orbit · <a href="./index.html">Sponza GI</a></span>
</div>
<div id="status">initializing WebGPU…</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';
import { createCausticEngine, causticReceiverFloor } from './js/caustic_engine.js';

const statusEl = document.getElementById('status');
const setStatus = (msg, err = false) => {
  statusEl.textContent = msg;
  statusEl.classList.toggle('err', err);
  statusEl.classList.remove('hide');
};
const hideStatus = () => statusEl.classList.add('hide');
window.addEventListener('error', (e) => setStatus('Error:\n' + (e.error?.stack || e.message), true));
window.addEventListener('unhandledrejection', (e) => setStatus('Error:\n' + (e.reason?.stack || e.reason), true));

// ── Renderer ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGPURenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.NeutralToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
await renderer.init();
if (renderer.backend?.isWebGPUBackend !== true) {
  setStatus('WebGPU not available.\nThis demo needs Chrome/Edge 121+ (or Firefox Nightly).', true);
  throw new Error('WebGPU unavailable');
}

// ── Scene & camera ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0e);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(3.6, 2.15, 4.4);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.55, 0);
controls.minDistance = 1.2;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.49;

// ── Room ────────────────────────────────────────────────────────────────────
const floorMat = new THREE.MeshStandardMaterial({
  color: 0xe8e4dc, roughness: 0.88, metalness: 0.0,
});
const wallMat = new THREE.MeshStandardMaterial({
  color: 0x2a2c32, roughness: 0.88, metalness: 0.0,
});
const sideMat = new THREE.MeshStandardMaterial({
  color: 0x1c1e24, roughness: 0.9, metalness: 0.0,
});

const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const backWall = new THREE.Mesh(new THREE.PlaneGeometry(8, 4), wallMat);
backWall.position.set(0, 2, -3.2);
backWall.receiveShadow = true;
scene.add(backWall);

const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(6.4, 4), sideMat);
leftWall.position.set(-4, 2, 0);
leftWall.rotation.y = Math.PI / 2;
leftWall.receiveShadow = true;
scene.add(leftWall);

// No pedestal — it was covering the brightest floor caustic under the glass.

// ── Glass (raster MeshPhysicalMaterial) ─────────────────────────────────────
function makeGlass({ color = 0xffffff, ior = 1.52, dispersion = 0.12, roughness = 0 } = {}) {
  return new THREE.MeshPhysicalMaterial({
    color,
    metalness: 0,
    roughness,
    transmission: 1,
    thickness: 1.2,
    ior,
    dispersion,
    transparent: true,
    opacity: 1,
    side: THREE.DoubleSide,
  });
}

const glassClear = makeGlass({ ior: 1.52, dispersion: 0.14 });
const glassTint = makeGlass({ color: 0xc8e8ff, ior: 1.55, dispersion: 0.18 });
const glassDense = makeGlass({ ior: 1.72, dispersion: 0.22 });

function makePrismGeometry(length = 1.4, height = 0.95, width = 0.85) {
  const hx = width * 0.5;
  const hy = height;
  const hz = length * 0.5;
  const A = [0, hy, hz], B = [-hx, 0, hz], C = [hx, 0, hz];
  const D = [0, hy, -hz], E = [hx, 0, -hz], F = [-hx, 0, -hz];
  const faces = [
    [A, B, C], [D, E, F],
    [A, C, E], [A, E, D],
    [A, D, F], [A, F, B],
    [B, F, E], [B, E, C],
  ];
  const positions = new Float32Array(faces.length * 9);
  let o = 0;
  for (const tri of faces) {
    for (const p of tri) { positions[o++] = p[0]; positions[o++] = p[1]; positions[o++] = p[2]; }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return geo;
}

const prism = new THREE.Mesh(makePrismGeometry(), glassDense);
prism.position.set(-0.85, 0.58, 0.15);
prism.rotation.set(0, 0.55, 0.0);
prism.castShadow = true;
scene.add(prism);

const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(0.48, 3), glassClear);
sphere.position.set(0.55, 0.58, 0.05);
sphere.castShadow = true;
scene.add(sphere);

const torus = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.14, 20, 40), glassTint);
torus.position.set(0.05, 0.72, -0.55);
torus.rotation.x = Math.PI / 2.2;
torus.rotation.z = 0.35;
torus.castShadow = true;
scene.add(torus);

const block = new THREE.Mesh(
  new THREE.BoxGeometry(0.18, 0.55, 0.18),
  new THREE.MeshStandardMaterial({ color: 0x111114, roughness: 0.7, metalness: 0 }),
);
block.position.set(-1.55, 0.4, 1.1);
block.castShadow = true;
block.receiveShadow = true;
scene.add(block);

// ── Spotlight ───────────────────────────────────────────────────────────────
const spot = new THREE.SpotLight(0xfff2e0, 80, 18, Math.PI / 7, 0.35, 1.6);
spot.position.set(-2.4, 3.6, 3.2);
spot.target.position.set(0.1, 0.55, 0);
spot.castShadow = true;
spot.shadow.mapSize.set(2048, 2048);
spot.shadow.bias = -0.0002;
spot.shadow.normalBias = 0.02;
scene.add(spot);
scene.add(spot.target);

const fill = new THREE.HemisphereLight(0x6a7a9a, 0x1a1814, 0.22);
scene.add(fill);
const ambient = new THREE.AmbientLight(0x404050, 0.15);
scene.add(ambient);

// ── Glass photon caustics (same engine as metal, refract mode) ───────────────
const params = {
  exposure: 1.05,
  spotIntensity: 80,
  spotAngle: 25.7,
  spotPenumbra: 0.35,
  spotColor: '#fff2e0',
  spotX: -2.4, spotY: 3.6, spotZ: 3.2,
  targetX: 0.1, targetY: 0.55, targetZ: 0,
  ior: 1.52,
  dispersion: 0.16,
  thickness: 0.35,
  glassRoughness: 0,
  causticStrength: 4.2,
  causticSoftness: 1.15,
  causticBloom: 0.25,
  causticEnabled: true,
};

setStatus('building glass caustics…');

const caustics = createCausticEngine({
  THREE,
  renderer,
  grid: 768,
  targetPhotons: 1_200_000,
  mode: 'refract',
  ior: params.ior,
  dispersion: params.dispersion,
  thickness: params.thickness,
  receiver: causticReceiverFloor({ y: 0, width: 8, height: 8 }),
});
caustics.setLight(params.spotX, params.spotY, params.spotZ);
caustics.setStrength(params.causticStrength);
caustics.setSoftness(params.causticSoftness);
caustics.setBloom(params.causticBloom);
caustics.setThrowFalloff(1 / (5 * 5));
// Through-mesh exit is O(tris) per photon — keep batches modest.
caustics.setPhotonBudget(60000);
caustics.overlayMesh.userData.maxjsVisible = false;
scene.add(caustics.overlayMesh);

// Bake all glass pieces into one world-space caster for photon emission.
function bakeCaster() {
  const pieces = [prism, sphere, torus];
  for (const m of pieces) m.updateMatrixWorld(true);
  const geos = pieces.map((m) => {
    let g = m.geometry.clone();
    if (g.index) {
      const flat = g.toNonIndexed();
      g.dispose();
      g = flat;
    }
    // Keep only position/normal so mergeGeometries stays compatible across shapes.
    for (const key of Object.keys(g.attributes)) {
      if (key !== 'position' && key !== 'normal') g.deleteAttribute(key);
    }
    g.applyMatrix4(m.matrixWorld);
    return g;
  });
  const merged = mergeGeometries(geos, false);
  for (const g of geos) g.dispose();
  if (!merged) {
    setStatus('Failed to merge glass caster mesh.', true);
    return;
  }
  merged.computeVertexNormals();
  // Geometry is already world-space; identity mesh so setCasterMesh doesn't double-transform.
  const caster = new THREE.Mesh(merged);
  caster.matrixAutoUpdate = false;
  caster.matrix.identity();
  caster.matrixWorld.identity();
  caustics.setCasterMesh(caster);
  merged.dispose();
}
bakeCaster();

function applyGlass() {
  for (const m of [glassClear, glassTint, glassDense]) {
    m.ior = params.ior;
    m.dispersion = params.dispersion;
    m.roughness = params.glassRoughness;
    m.needsUpdate = true;
  }
  glassDense.ior = Math.min(2.2, params.ior + 0.18);
  glassDense.dispersion = Math.min(0.5, params.dispersion * 1.35);
  caustics.setIor(params.ior);
  caustics.setDispersion(params.dispersion);
  caustics.setThickness(params.thickness);
  caustics.setRoughness(Math.max(0.01, params.glassRoughness));
}

function applySpot() {
  spot.intensity = params.spotIntensity;
  spot.angle = THREE.MathUtils.degToRad(params.spotAngle);
  spot.penumbra = params.spotPenumbra;
  spot.color.set(params.spotColor);
  spot.position.set(params.spotX, params.spotY, params.spotZ);
  spot.target.position.set(params.targetX, params.targetY, params.targetZ);
  spot.target.updateMatrixWorld();
  caustics.setLight(params.spotX, params.spotY, params.spotZ);
}

function applyExposure() {
  renderer.toneMappingExposure = params.exposure;
}

function applyCausticLook() {
  caustics.setStrength(params.causticStrength);
  caustics.setSoftness(params.causticSoftness);
  caustics.setBloom(params.causticBloom);
  caustics.overlayMesh.visible = params.causticEnabled;
}

applyGlass();
applySpot();
applyExposure();
applyCausticLook();
hideStatus();

// ── GUI ─────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: 'Glass · Caustics' });
const fSpot = gui.addFolder('Spotlight');
fSpot.add(params, 'spotIntensity', 0, 200, 1).name('intensity').onChange(applySpot);
fSpot.add(params, 'spotAngle', 5, 60, 0.5).name('angle°').onChange(applySpot);
fSpot.add(params, 'spotPenumbra', 0, 1, 0.01).name('penumbra').onChange(applySpot);
fSpot.addColor(params, 'spotColor').name('color').onChange(applySpot);
fSpot.add(params, 'spotX', -6, 6, 0.05).name('pos X').onChange(applySpot);
fSpot.add(params, 'spotY', 0.5, 8, 0.05).name('pos Y').onChange(applySpot);
fSpot.add(params, 'spotZ', -6, 6, 0.05).name('pos Z').onChange(applySpot);

const fGlass = gui.addFolder('Glass');
fGlass.add(params, 'ior', 1.05, 2.4, 0.01).name('IOR').onChange(applyGlass);
fGlass.add(params, 'dispersion', 0, 0.45, 0.005).name('dispersion').onChange(applyGlass);
fGlass.add(params, 'thickness', 0.05, 1.5, 0.01).name('slab thickness').onChange(applyGlass);
fGlass.add(params, 'glassRoughness', 0, 0.35, 0.005).name('roughness').onChange(applyGlass);

const fCau = gui.addFolder('Floor caustics');
fCau.add(params, 'causticEnabled').name('enabled').onChange(applyCausticLook);
fCau.add(params, 'causticStrength', 0, 8, 0.05).name('strength').onChange(applyCausticLook);
fCau.add(params, 'causticSoftness', 0.1, 2, 0.01).name('softness').onChange(applyCausticLook);
fCau.add(params, 'causticBloom', 0, 1.5, 0.01).name('bloom').onChange(applyCausticLook);

gui.add(params, 'exposure', 0.2, 3, 0.01).name('exposure').onChange(applyExposure);

const compact = window.matchMedia('(max-width: 700px), (max-height: 560px)');
if (compact.matches) gui.close();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

window.caustics = caustics;
window.scene = scene;
window.spot = spot;

// ── Render loop ─────────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
  controls.update();
  if (params.causticEnabled) caustics.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
