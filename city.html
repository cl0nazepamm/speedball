<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SPEEDBALL GI - Procedural City Benchmark</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #11151c;
    color: #cdd6e0;
    font: 12px/1.5 ui-monospace, "Cascadia Code", Menlo, monospace;
  }
  #c { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed;
    left: 12px;
    top: 10px;
    z-index: 10;
    max-width: 54ch;
    pointer-events: none;
    text-shadow: 0 1px 2px #000a;
  }
  #hud b { color: #8fd0ff; font-weight: 600; letter-spacing: .04em; }
  #hud .sub { color: #8b96a6; }
  #hud .metric { color: #dce7f7; }
  #status {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    padding: 14px 20px;
    border-radius: 10px;
    background: #1a2230d0;
    border: 1px solid #2c384a;
    color: #cdd6e0;
    white-space: pre;
    text-align: center;
  }
  #status.err { border-color: #6b2330; color: #ff9aa6; background: #2a161bd0; }
  #status.hide { display: none; }
  .lil-gui { --width: 290px; --font-size: 11px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three-r185/build/three.webgpu.js",
    "three/webgpu": "./vendor/three-r185/build/three.webgpu.js",
    "three/tsl": "./vendor/three-r185/build/three.tsl.js",
    "three/addons/": "./vendor/three-r185/examples/",
    "three-mesh-bvh": "./node_modules/three-mesh-bvh/src/index.js"
  },
  "scopes": {
    "./node_modules/three-mesh-bvh/": { "three": "./vendor/three-r185/build/three.module.js" }
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <b>SPEEDBALL GI</b> <span class="sub">city benchmark</span><br>
  <span class="metric" id="mode-stat">mode: starting</span><br>
  <span class="metric" id="fps-stat">fps: --</span><br>
  <span class="metric" id="bench-stat">benchmark: idle</span><br>
  <span class="sub" id="gi-stat">gi: starting</span>
</div>
<div id="status">initializing WebGPU...</div>

<script type="module">
import * as THREE from 'three';
import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
import { SkyMesh } from 'three/addons/objects/SkyMesh.js';
import { Inspector } from 'three/addons/inspector/Inspector.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';
import { installSpeedballGI, excludeFromGI, prepareMaterialsForGI } from './js/index.js';
import { CityGenerator, createBuildingMaterial, createRoadMaterial } from 'three/addons/generators/CityGenerator.js';

const statusEl = document.getElementById('status');
const setStatus = (msg, err = false) => {
  statusEl.textContent = msg;
  statusEl.classList.toggle('err', err);
  statusEl.classList.remove('hide');
};
const hideStatus = () => statusEl.classList.add('hide');
window.addEventListener('error', (e) => setStatus('Error:\n' + (e.error?.stack || e.message), true));
window.addEventListener('unhandledrejection', (e) => setStatus('Error:\n' + (e.reason?.stack || e.reason), true));

const query = new URLSearchParams(location.search);
const getBool = (name, fallback) => {
  if (!query.has(name)) return fallback;
  const v = query.get(name).toLowerCase();
  return !(v === '0' || v === 'false' || v === 'off' || v === 'no');
};
const getNumber = (name, fallback, min = -Infinity, max = Infinity) => {
  if (!query.has(name)) return fallback;
  const v = Number(query.get(name));
  return Number.isFinite(v) ? THREE.MathUtils.clamp(v, min, max) : fallback;
};

const USE_GI = getBool('gi', true);
const AUTO_BENCHMARK = getBool('bench', false);
const pixelRatio = getNumber('dpr', window.devicePixelRatio, 0.5, 4);

const canvas = document.getElementById('c');
const renderer = new THREE.WebGPURenderer({ canvas, antialias: true });
renderer.setPixelRatio(pixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.45;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.inspector = new Inspector();
await renderer.init();

if (renderer.backend?.isWebGPUBackend !== true) {
  setStatus('WebGPU not available.\nThis benchmark needs a WebGPU-capable browser.', true);
  throw new Error('WebGPU unavailable');
}

const pmremGenerator = new THREE.PMREMGenerator(renderer);
const scene = new THREE.Scene();
scene.environmentIntensity = 0.2;

const sky = excludeFromGI(new SkyMesh());
sky.scale.setScalar(10000);
sky.turbidity.value = 8;
sky.rayleigh.value = 3;
sky.mieCoefficient.value = 0.008;
sky.mieDirectionalG.value = 0.88;

const sun = new THREE.Vector3();
const envScene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
camera.position.set(-35, 55, -100);

const controls = new FirstPersonControls(camera, renderer.domElement);
controls.movementSpeed = 15;
controls.lookSpeed = 0.25;
controls.lookAt(35, 55, 0);

const timer = new THREE.Timer();

const sunLight = new THREE.DirectionalLight();
sunLight.castShadow = true;
sunLight.shadow.camera.left = -280;
sunLight.shadow.camera.right = 280;
sunLight.shadow.camera.top = 360;
sunLight.shadow.camera.bottom = -40;
sunLight.shadow.camera.far = 2400;
sunLight.shadow.mapSize.set(4096, 4096);
sunLight.shadow.bias = -0.0004;
scene.add(sunLight);

const parameters = {
  seed: Math.round(getNumber('seed', 94, 0, 1000)),
  timeOfDay: getNumber('time', 12, 6, 18),
  exposure: getNumber('exposure', 0.45, 0, 4),
  giIntensity: getNumber('intensity', 6, 0, 100),
  giDivisions: Math.round(getNumber('divisions', 12, 2, 32)),
  giRays: Math.round(getNumber('rays', 64, 32, 256)),
  giCascades: Math.round(getNumber('cascades', 2, 1, 2)),
  giHysteresis: 0.95,
  giNormalBias: 1,
  giChebyStrength: 0,
  giClassifyStrength: 0,
  giRadianceClamp: 8,
  giDepthSharpness: 50,
  giChangeThreshold: 2.5,
  giSnapAmount: 0.30,
  giFireflyClamp: 6.0,
};
renderer.toneMappingExposure = parameters.exposure;

let gi = null;
let cityGroup = null;
let buildingMaterial = null;
const city = new CityGenerator({ seed: parameters.seed });

function markGiSceneChanged() {
  if (!gi) return;
  prepareMaterialsForGI(scene);
  gi.markMaterialsDirty?.();
  gi.requestRebuild?.();
  gi.markInteraction?.();
}

function generateCity() {
  if (cityGroup) scene.remove(cityGroup);
  buildingMaterial?.dispose?.();

  city.parameters.seed = parameters.seed;
  buildingMaterial = createBuildingMaterial(city.layout, parameters.seed);
  cityGroup = city.build({ building: buildingMaterial });
  cityGroup.traverse((o) => {
    if (!o.isMesh) return;
    o.castShadow = true;
    o.receiveShadow = true;
  });

  scene.add(cityGroup);
  markGiSceneChanged();
}

const floorW = city.layout.cityW + 2 * city.layout.street;
const floorD = city.layout.cityD + 2 * city.layout.street;
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(floorW, floorD).rotateX(-Math.PI / 2),
  createRoadMaterial(city.layout)
);
ground.receiveShadow = true;
scene.add(ground);
generateCity();

const _warm = new THREE.Color(0xffb072);
const _cool = new THREE.Color(0xfff4e8);
function updateSun() {
  const t = parameters.timeOfDay;
  const u = (t - 12) / 6;
  const elevation = Math.max(0, 1 - u * u) * 72;
  const azimuth = 90 - u * 55;

  sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(90 - elevation), THREE.MathUtils.degToRad(azimuth));
  sky.sunPosition.value.copy(sun);

  const sinE = Math.sin(THREE.MathUtils.degToRad(elevation));
  const transmittance = Math.sqrt(Math.max(sinE, 0));
  sunLight.color.copy(_warm).lerp(_cool, transmittance);
  sunLight.intensity = 6 * transmittance;
  sunLight.position.copy(sun).multiplyScalar(600);

  sky.showSunDisc.value = false;
  envScene.add(sky);
  const env = pmremGenerator.fromScene(envScene).texture;
  if (scene.environment) scene.environment.dispose();
  scene.environment = env;
  sky.showSunDisc.value = true;
  scene.add(sky);

  gi?.markInteraction?.();
}
updateSun();

if (USE_GI) {
  gi = installSpeedballGI({
    renderer,
    scene,
    camera,
    enabled: true,
    intensity: parameters.giIntensity,
    divisions: parameters.giDivisions,
    hysteresis: parameters.giHysteresis,
    prepareMaterials: true,
  });
  gi.setSmoothness(1);
  gi.setFilterStrength(1);
  gi.setRays(parameters.giRays);
  gi.setCascades(parameters.giCascades);
  gi.setContinuous(true);
  gi.setNormalBias(parameters.giNormalBias);
  gi.setChebyStrength(parameters.giChebyStrength);
  gi.setClassifyStrength(parameters.giClassifyStrength);
  gi.setRadianceClamp(parameters.giRadianceClamp);
  gi.setDepthSharpness(parameters.giDepthSharpness);
  gi.setChangeThreshold(parameters.giChangeThreshold);
  gi.setSnapAmount(parameters.giSnapAmount);
  gi.setFireflyClamp(parameters.giFireflyClamp);
  if (!gi.isSupported()) setStatus('SPEEDBALL GI needs WebGPU storage features.', true);
}

window.gi = gi;
window.camera = camera;
window.controls = controls;
window.renderer = renderer;
window.scene = scene;

const modeStatEl = document.getElementById('mode-stat');
const fpsStatEl = document.getElementById('fps-stat');
const benchStatEl = document.getElementById('bench-stat');
const giStatEl = document.getElementById('gi-stat');

const benchmark = {
  seconds: getNumber('seconds', 20, 5, 180),
  warmup: getNumber('warmup', 2, 0, 30),
  cameraPath: getBool('path', true),
  pending: false,
  running: false,
  startMs: 0,
  samples: [],
  summary: null,
  emaMs: 16.7,
  lastFrameMs: 0,
  hudMs: 0,
};

const benchTarget = new THREE.Vector3(0, 48, 0);
function updateBenchmarkCamera(nowMs) {
  const t = Math.max(0, (nowMs - benchmark.startMs) / 1000);
  const angle = -2.35 + t * 0.18;
  const radius = 168 + Math.sin(t * 0.31) * 16;
  camera.position.set(Math.cos(angle) * radius, 58 + Math.sin(t * 0.43) * 11, Math.sin(angle) * radius);
  controls.lookAt(benchTarget.x, benchTarget.y, benchTarget.z);
}

function percentile(sorted, p) {
  if (!sorted.length) return 0;
  const i = Math.min(sorted.length - 1, Math.max(0, Math.floor((sorted.length - 1) * p)));
  return sorted[i];
}

function summarizeBenchmark() {
  const samples = benchmark.samples;
  if (!samples.length) return null;

  const sorted = [...samples].sort((a, b) => a - b);
  const avgMs = samples.reduce((a, b) => a + b, 0) / samples.length;
  return {
    mode: USE_GI ? 'speedball' : 'original',
    frames: samples.length,
    seconds: benchmark.seconds,
    dpr: renderer.getPixelRatio(),
    avgMs,
    avgFps: 1000 / avgMs,
    low1Fps: 1000 / percentile(sorted, 0.99),
    low5Fps: 1000 / percentile(sorted, 0.95),
    minFps: 1000 / sorted[sorted.length - 1],
    maxFps: 1000 / sorted[0],
  };
}

function formatSummary(s) {
  if (!s) return 'benchmark: no samples';
  return `benchmark: avg ${s.avgFps.toFixed(1)} fps | 1% ${s.low1Fps.toFixed(1)} | min ${s.minFps.toFixed(1)} | ${s.frames} frames`;
}

function startBenchmark() {
  benchmark.pending = true;
  benchmark.running = false;
  benchmark.startMs = 0;
  benchmark.samples.length = 0;
  benchmark.summary = null;
  benchmark.lastFrameMs = 0;
  benchStatEl.textContent = USE_GI ? 'benchmark: waiting for GI build' : `benchmark: warming ${benchmark.warmup.toFixed(1)}s`;
}

function giReadyForBenchmark() {
  if (!gi) return true;
  if (gi.hasData?.() !== true) return false;
  const s = gi.getStats?.();
  return !!s && s.probes > 0 && s.active === true;
}

function beginBenchmark(nowMs) {
  benchmark.pending = false;
  benchmark.running = true;
  benchmark.startMs = nowMs;
  benchmark.lastFrameMs = nowMs;
  benchStatEl.textContent = `benchmark: warming 0.0/${benchmark.warmup.toFixed(1)}s`;
}

function finishBenchmark() {
  benchmark.pending = false;
  benchmark.running = false;
  benchmark.summary = summarizeBenchmark();
  benchStatEl.textContent = formatSummary(benchmark.summary);
  console.table(benchmark.summary ? [benchmark.summary] : []);
}

function updateFrameStats(nowMs) {
  if (!benchmark.lastFrameMs) {
    benchmark.lastFrameMs = nowMs;
    return;
  }

  const dt = nowMs - benchmark.lastFrameMs;
  benchmark.lastFrameMs = nowMs;
  if (!Number.isFinite(dt) || dt <= 0 || document.visibilityState === 'hidden') return;

  benchmark.emaMs += (dt - benchmark.emaMs) * 0.08;
  if (!benchmark.running) return;

  if (!benchmark.startMs) benchmark.startMs = nowMs;
  const elapsed = (nowMs - benchmark.startMs) / 1000;
  const measuring = elapsed - benchmark.warmup;

  if (measuring >= 0 && measuring <= benchmark.seconds) benchmark.samples.push(dt);
  if (measuring >= benchmark.seconds) finishBenchmark();
}

function reloadBenchmark(useGi) {
  const next = new URL(location.href);
  next.searchParams.set('gi', useGi ? '1' : '0');
  next.searchParams.set('bench', '1');
  next.searchParams.set('seconds', String(Math.round(benchmark.seconds)));
  next.searchParams.set('warmup', String(Math.round(benchmark.warmup)));
  next.searchParams.set('seed', String(parameters.seed));
  next.searchParams.set('time', parameters.timeOfDay.toFixed(2));
  next.searchParams.set('dpr', renderer.getPixelRatio().toFixed(2));
  location.assign(next.toString());
}

function updateHud(nowMs) {
  if (nowMs - benchmark.hudMs < 250) return;
  benchmark.hudMs = nowMs;

  modeStatEl.textContent = `mode: ${USE_GI ? 'Speedball GI' : 'original city'} | dpr ${renderer.getPixelRatio().toFixed(2)} | Inspector on`;
  fpsStatEl.textContent = `fps: ${(1000 / benchmark.emaMs).toFixed(1)} | frame ${benchmark.emaMs.toFixed(2)} ms`;

  if (benchmark.pending) {
    const s = gi?.getStats?.();
    const probes = s?.probes ?? 0;
    benchStatEl.textContent = gi
      ? `benchmark: waiting for GI build | ${probes} probes`
      : 'benchmark: arming';
  } else if (benchmark.running) {
    const elapsed = benchmark.startMs ? (nowMs - benchmark.startMs) / 1000 : 0;
    const measuring = Math.max(0, elapsed - benchmark.warmup);
    const phase = elapsed < benchmark.warmup ? 'warming' : 'measuring';
    benchStatEl.textContent = `benchmark: ${phase} ${measuring.toFixed(1)}/${benchmark.seconds.toFixed(1)}s | ${benchmark.samples.length} frames`;
  } else if (benchmark.summary) {
    benchStatEl.textContent = formatSummary(benchmark.summary);
  }

  if (!gi) {
    giStatEl.textContent = 'gi: off';
  } else {
    const s = gi.getStats?.();
    giStatEl.textContent = s
      ? `gi: ${s.probes} probes (${s.res.x}x${s.res.y}x${s.res.z}) | rays ${s.rays} | cascades ${s.cascades} | active ${s.active}`
      : 'gi: building';
  }
}

const gui = new GUI({ title: 'City Benchmark' });
const fScene = gui.addFolder('Scene');
fScene.add(parameters, 'seed', 0, 1000, 1).onFinishChange(() => { generateCity(); });
fScene.add(parameters, 'timeOfDay', 6, 18, 0.1).name('time').onChange(updateSun);
fScene.add(parameters, 'exposure', 0, 4, 0.01).onChange((v) => { renderer.toneMappingExposure = v; });

const benchmarkActions = {
  mode: USE_GI ? 'Speedball GI' : 'Original',
  run: startBenchmark,
  speedball: () => reloadBenchmark(true),
  original: () => reloadBenchmark(false),
};
const fBench = gui.addFolder('Benchmark');
fBench.add(benchmarkActions, 'mode', ['Speedball GI', 'Original']).onChange((v) => {
  const nextGi = v === 'Speedball GI';
  if (nextGi !== USE_GI) reloadBenchmark(nextGi);
});
fBench.add(benchmark, 'seconds', 5, 180, 1);
fBench.add(benchmark, 'warmup', 0, 30, 1);
fBench.add(benchmark, 'cameraPath').name('camera path');
fBench.add(benchmarkActions, 'run').name('run');
fBench.add(benchmarkActions, 'speedball').name('run Speedball');
fBench.add(benchmarkActions, 'original').name('run original');

if (gi) {
  const fGI = gui.addFolder('Speedball GI');
  fGI.add(parameters, 'giIntensity', 0, 100, 0.05).name('intensity').onChange((v) => gi.setIntensity(v));
  fGI.add(parameters, 'giDivisions', 2, 32, 1).name('divisions').onFinishChange((v) => { gi.setDivisions(v); gi.markInteraction?.(); });
  fGI.add(parameters, 'giRays', 32, 256, 16).name('rays').onFinishChange((v) => { gi.setRays(v); gi.markInteraction?.(); });
  fGI.add(parameters, 'giCascades', { 'single grid': 1, 'cascaded': 2 }).name('cascades').onFinishChange((v) => { gi.setCascades(+v); gi.markInteraction?.(); });
}

window.speedballBenchmark = {
  start: startBenchmark,
  finish: finishBenchmark,
  summary: () => benchmark.summary,
  runSpeedball: () => reloadBenchmark(true),
  runOriginal: () => reloadBenchmark(false),
};

hideStatus();
if (AUTO_BENCHMARK) startBenchmark();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  gi?.markInteraction?.();
});

renderer.setAnimationLoop((nowMs) => {
  timer.update();
  const delta = timer.getDelta();

  if (benchmark.running && benchmark.cameraPath) {
    updateBenchmarkCamera(nowMs);
  } else {
    controls.update(delta);
  }

  gi?.update({ camera, playing: benchmark.running && benchmark.cameraPath });
  if (benchmark.pending && giReadyForBenchmark()) beginBenchmark(nowMs);
  renderer.render(scene, camera);
  updateFrameStats(nowMs);
  updateHud(nowMs);
});
</script>
</body>
</html>
