<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SPEEDBALL GI — Procedural City (WebGPU DDGI + Sky)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #11151c; color: #cdd6e0;
    font: 12px/1.5 ui-monospace, "Cascadia Code", Menlo, monospace; }
  #c { display: block; width: 100vw; height: 100vh; }
  #hud { position: fixed; left: 12px; top: 10px; pointer-events: none;
    text-shadow: 0 1px 2px #000a; max-width: 46ch; }
  #hud b { color: #8fd0ff; font-weight: 600; letter-spacing: .04em; }
  #hud .sub { color: #7c8794; }
  #status { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    padding: 14px 20px; border-radius: 10px; background: #1a2230d0; border: 1px solid #2c384a;
    color: #cdd6e0; white-space: pre; text-align: center; }
  #status.err { border-color: #6b2330; color: #ff9aa6; background: #2a161bd0; }
  #status.hide { display: none; }
  .lil-gui { --width: 290px; --font-size: 11px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three-r185/build/three.webgpu.js",
    "three/webgpu": "./vendor/three-r185/build/three.webgpu.js",
    "three/tsl": "./vendor/three-r185/build/three.tsl.js",
    "three/addons/": "./vendor/three-r185/examples/",
    "three-mesh-bvh": "./node_modules/three-mesh-bvh/src/index.js"
  },
  "scopes": {
    "./node_modules/three-mesh-bvh/": { "three": "./vendor/three-r185/build/three.module.js" }
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <b>SPEEDBALL GI</b> <span class="sub">· procedural city · BVH-traced DDGI · WebGPU</span><br>
  <span class="sub">WASD + drag to look · sun = time of day</span><br>
  <span class="sub" id="gi-stat">GI: starting…</span>
</div>
<div id="status">initializing WebGPU…</div>

<script type="module">
import * as THREE from 'three';
import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
import { SkyMesh } from 'three/addons/objects/SkyMesh.js';
import { Inspector } from 'three/addons/inspector/Inspector.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';
import { createProbeField } from './js/gi_probes.js?v=speedball4';
import { giLights } from './js/gi_lights_node.js?v=speedball4';
import { CityGenerator, createBuildingMaterial, createRoadMaterial } from 'three/addons/generators/CityGenerator.js';

const statusEl = document.getElementById('status');
const setStatus = (msg, err = false) => { statusEl.textContent = msg; statusEl.classList.toggle('err', err); statusEl.classList.remove('hide'); };
const hideStatus = () => statusEl.classList.add('hide');
window.addEventListener('error', (e) => setStatus('Error:\n' + (e.error?.stack || e.message), true));
window.addEventListener('unhandledrejection', (e) => setStatus('Error:\n' + (e.reason?.stack || e.reason), true));

// ── Renderer (matches webgpu_generator_city) ──────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGPURenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.45;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.inspector = new Inspector();        // performance metric (CPU/GPU/FPS), same as the example
await renderer.init();
if (renderer.backend?.isWebGPUBackend !== true) {
  setStatus('WebGPU not available.\nThis demo needs a WebGPU-capable browser\n(Chrome/Edge 121+, or Firefox Nightly).', true);
  throw new Error('WebGPU unavailable');
}

// ── SPEEDBALL GI lighting node — install BEFORE any material compiles ──────────────
renderer.lighting.createNode = (lights = []) => giLights({
  maxDirectionalLights: 4, maxPointLights: 16, maxSpotLights: 16, maxHemisphereLights: 2,
}).setLights(lights);

const pmremGenerator = new THREE.PMREMGenerator(renderer);

const scene = new THREE.Scene();
scene.environmentIntensity = 0.2;            // matches the example (sky IBL strength)

// ── Sky (matches the example exactly) ─────────────────────────────────────────
const sky = new SkyMesh();
sky.scale.setScalar(10000);
sky.turbidity.value = 8;
sky.rayleigh.value = 3;
sky.mieCoefficient.value = 0.008;
sky.mieDirectionalG.value = 0.88;
sky.userData.maxjsVisible = false;           // keep the sky OUT of the GI BVH
const sun = new THREE.Vector3();
const envScene = new THREE.Scene();

// ── Camera + controls (matches the example) ───────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
camera.position.set(-35, 55, -100);
const controls = new FirstPersonControls(camera, renderer.domElement);
controls.movementSpeed = 15;
controls.lookSpeed = 0.25;
controls.lookAt(35, 55, 0);
const timer = new THREE.Timer();

// GI idle tracking (defined early — generateCity/updateSun call markInteraction).
let lastInteractionMs = 0;
const markInteraction = () => { lastInteractionMs = performance.now(); };

// ── Sun light + shadows (matches the example) ─────────────────────────────────
const sunLight = new THREE.DirectionalLight();
sunLight.castShadow = true;
sunLight.shadow.camera.left = -280; sunLight.shadow.camera.right = 280;
sunLight.shadow.camera.top = 360; sunLight.shadow.camera.bottom = -40;
sunLight.shadow.camera.far = 2400;
sunLight.shadow.mapSize.set(4096, 4096);
sunLight.shadow.bias = -0.0004;
scene.add(sunLight);

// ── Procedural city (generated at RUNTIME — no GLB) ────────────────────────────
const parameters = {
  seed: 94, timeOfDay: 12, exposure: 0.45,   // noon = bright (was dawn/dim); overridden by saved state
  giEnabled: true, giIntensity: 8, giDivisions: 14, showProbes: false,
  giRays: 64, giDenoise: 1, giHysteresis: 0.95, giNormalBias: 1,
  giRadianceClamp: 8, giDepthSharpness: 50, giLeak: 0, giSolid: 0,
};

let gi = null, cityGroup = null;
const city = new CityGenerator({ seed: parameters.seed });
const materials = { building: createBuildingMaterial(city.layout, parameters.seed) };

// SPEEDBALL GI traces packed scalar PBR; the procedural buildings import metallic, which
// kills diffuse bounce (metals don't bounce Lambert) — the Sponza trap. Normalise the
// trace-side scalar to dielectric so the city actually bounces. Node visual is untouched.
function prepMaterials(o) {
  const ms = Array.isArray(o.material) ? o.material : (o.material ? [o.material] : []);
  for (const m of ms) {
    if (!m || m.userData?.speedballGiPrepared) continue;
    m.userData = m.userData || {}; m.userData.speedballGiPrepared = true;
    if (Number.isFinite(m.metalness) && m.metalness > 0.5) { m.metalness = 0; m.needsUpdate = true; }
    if (Number.isFinite(m.roughness) && m.roughness < 0.6) { m.roughness = 0.6; m.needsUpdate = true; }
  }
}

function generateCity() {
  if (cityGroup) scene.remove(cityGroup);
  city.parameters.seed = parameters.seed;
  cityGroup = city.build(materials);
  cityGroup.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; prepMaterials(o); } });
  scene.add(cityGroup);
  gi?.requestRebuild();
  markInteraction();
}

const floorW = city.layout.cityW + 2 * city.layout.street;
const floorD = city.layout.cityD + 2 * city.layout.street;
const ground = new THREE.Mesh(new THREE.PlaneGeometry(floorW, floorD).rotateX(-Math.PI / 2), createRoadMaterial(city.layout));
ground.receiveShadow = true;
prepMaterials(ground);
scene.add(ground);
generateCity();

// ── Sun placement / sky env (matches the example) ─────────────────────────────
const _warm = new THREE.Color(0xffb072), _cool = new THREE.Color(0xfff4e8);
function updateSun() {
  const t = parameters.timeOfDay;
  const u = (t - 12) / 6;
  const elevation = Math.max(0, 1 - u * u) * 72;
  const azimuth = 90 - u * 55;
  sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(90 - elevation), THREE.MathUtils.degToRad(azimuth));
  sky.sunPosition.value.copy(sun);

  const sinE = Math.sin(THREE.MathUtils.degToRad(elevation));
  const transmittance = Math.sqrt(Math.max(sinE, 0));
  sunLight.color.copy(_warm).lerp(_cool, transmittance);
  sunLight.intensity = 6 * transmittance;
  sunLight.position.copy(sun).multiplyScalar(600);

  sky.showSunDisc.value = false;
  envScene.add(sky);
  const env = pmremGenerator.fromScene(envScene).texture;
  if (scene.environment) scene.environment.dispose();
  scene.environment = env;
  sky.showSunDisc.value = true;
  scene.add(sky);

  markInteraction();
}
updateSun();

// ── GI idle gate via camera transform (FirstPersonControls is drag-to-look, so the
// camera settles when you let go → GI converges; world-space GI holds static while moving)
const _prevPos = new THREE.Vector3(Infinity, 0, 0), _prevQuat = new THREE.Quaternion(2, 0, 0, 0);
function cameraIsMoving() {
  const moved = camera.position.distanceToSquared(_prevPos) > 1e-7 || Math.abs(camera.quaternion.dot(_prevQuat)) < 0.99999995;
  _prevPos.copy(camera.position); _prevQuat.copy(camera.quaternion);
  return moved;
}
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  markInteraction();
});

// ── SPEEDBALL GI probe field over the runtime city (NO post-processing — only GI) ───
function markGiMaterialsDirty() {
  const seen = new WeakSet();
  const mark = (m) => {
    if (!m || seen.has(m)) return; seen.add(m);
    if (m.isMeshBasicMaterial || m.isLineBasicMaterial || m.visible === false) return;
    m.dispose?.(); m.needsUpdate = true; // needsUpdate alone doesn't rebuild the node graph here
  };
  scene.traverse((o) => { if (!o.material) return; (Array.isArray(o.material) ? o.material : [o.material]).forEach(mark); });
}

gi = createProbeField({ renderer, scene, intensity: parameters.giIntensity, hysteresis: 0.95, divisions: parameters.giDivisions, onRebuilt: markGiMaterialsDirty });
if (!gi.isSupported()) setStatus('SPEEDBALL GI needs WebGPU storage features.', true);
gi.setEnabled(parameters.giEnabled);
gi.setSmoothness(1);                         // pinned (no slider)
gi.setFilterStrength(parameters.giDenoise);
gi.setHysteresis(parameters.giHysteresis);
gi.setNormalBias(parameters.giNormalBias);
gi.setRadianceClamp(parameters.giRadianceClamp);
gi.setDepthSharpness(parameters.giDepthSharpness);
gi.setChebyStrength(parameters.giLeak);
gi.setClassifyStrength(0);                    // solid-scene pinned off
gi.setRays(parameters.giRays);
window.gi = gi; window.camera = camera; window.controls = controls; window.renderer = renderer; window.scene = scene;
hideStatus();
markInteraction();

// ── GUI ────────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: 'SPEEDBALL GI · City' });
const fCity = gui.addFolder('City / Sun');
fCity.add(parameters, 'seed', 0, 100, 1).onChange(generateCity);
fCity.add(parameters, 'timeOfDay', 6, 18, 0.1).name('time of day').onChange(updateSun);
const fGI = gui.addFolder('SPEEDBALL GI');
fGI.add(parameters, 'giEnabled').name('enabled').onChange((v) => { gi?.setEnabled(v); markInteraction(); });
fGI.add(parameters, 'giIntensity').min(0).step(0.05).name('intensity').onChange((v) => { gi?.setIntensity(v); markInteraction(); });
fGI.add(parameters, 'giDivisions', 2, 32, 1).name('divisions').onChange((v) => { gi?.setDivisions(v); updateProbeHelpers(); markInteraction(); });
fGI.add(parameters, 'giRays', 32, 256, 16).name('rays / probe').onChange((v) => { gi?.setRays(v); markInteraction(); });
fGI.add(parameters, 'showProbes').name('show probes').onChange(updateProbeHelpers);
const fQ = fGI.addFolder('Quality');
fQ.add(parameters, 'giDenoise', 0, 1, 0.05).name('denoise').onChange((v) => { gi?.setFilterStrength(v); markInteraction(); });
fQ.add(parameters, 'giHysteresis', 0.5, 0.99, 0.01).name('hysteresis').onChange((v) => { gi?.setHysteresis(v); markInteraction(); });
fQ.add(parameters, 'giNormalBias', 0, 4, 0.05).name('normal bias').onChange((v) => { gi?.setNormalBias(v); markInteraction(); });
fQ.add(parameters, 'giRadianceClamp', 0, 32, 0.5).name('radiance clamp').onChange((v) => { gi?.setRadianceClamp(v); markInteraction(); });
fQ.add(parameters, 'giDepthSharpness', 1, 200, 1).name('depth sharpness').onChange((v) => { gi?.setDepthSharpness(v); markInteraction(); });
fQ.add(parameters, 'giLeak', 0, 1, 0.05).name('chebyshev strength').onChange((v) => { gi?.setChebyStrength(v); markInteraction(); });
// solid-scene (classify) stays hidden + pinned to 0 (no buried probes in this open city).
gui.add(parameters, 'exposure').min(0).step(0.01).name('exposure').onChange((v) => { renderer.toneMappingExposure = v; });

// ── Persist camera + all settings to localStorage, restore on load ──────────────
// This is what stops every reload (mine included) from resetting your view/time/GI.
const STORE_KEY = 'speedball-city-state-v1';
const _fwd = new THREE.Vector3();
function saveState() {
  try {
    camera.getWorldDirection(_fwd);
    const look = camera.position.clone().add(_fwd.multiplyScalar(80));
    localStorage.setItem(STORE_KEY, JSON.stringify({
      cam: camera.position.toArray(), look: look.toArray(), exposure: renderer.toneMappingExposure,
      p: {
        seed: parameters.seed, timeOfDay: parameters.timeOfDay,
        giEnabled: parameters.giEnabled, giIntensity: parameters.giIntensity, giDivisions: parameters.giDivisions, giRays: parameters.giRays,
        giDenoise: parameters.giDenoise, giHysteresis: parameters.giHysteresis, giNormalBias: parameters.giNormalBias,
        giRadianceClamp: parameters.giRadianceClamp, giDepthSharpness: parameters.giDepthSharpness, giLeak: parameters.giLeak,
      },
    }));
  } catch (e) { /* storage disabled */ }
}
let _saveTimer = 0;
function scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(saveState, 500); }
function loadState() {
  let s; try { s = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) { return; }
  if (!s) return;
  if (s.p) Object.assign(parameters, s.p);
  if (Number.isFinite(s.exposure)) renderer.toneMappingExposure = s.exposure;
  if (parameters.seed !== city.parameters.seed) generateCity();
  gi.setEnabled(parameters.giEnabled); gi.setIntensity(parameters.giIntensity);
  gi.setDivisions(parameters.giDivisions); gi.setRays(parameters.giRays);
  gi.setFilterStrength(parameters.giDenoise); gi.setHysteresis(parameters.giHysteresis);
  gi.setNormalBias(parameters.giNormalBias); gi.setRadianceClamp(parameters.giRadianceClamp);
  gi.setDepthSharpness(parameters.giDepthSharpness);
  gi.setChebyStrength(parameters.giLeak); gi.setClassifyStrength(0);   // solid-scene stays pinned off
  if (Array.isArray(s.cam)) camera.position.fromArray(s.cam);
  if (Array.isArray(s.look)) controls.lookAt(s.look[0], s.look[1], s.look[2]);
  updateSun();
  gui.controllersRecursive().forEach((c) => c.updateDisplay());
  markInteraction();
}
gui.onChange(() => scheduleSave());   // any GUI change → save (debounced)
loadState();                          // restore last session (camera, time, GI, exposure)
window.speedballResetView = () => { try { localStorage.removeItem(STORE_KEY); } catch (e) {} location.reload(); };

// ── Probe helper spheres (diagnostic) ──────────────────────────────────────────
let probeHelperMesh = null, probeHelperSig = '';
const _pgVec = new THREE.Vector3(), _pgMat = new THREE.Matrix4();
function updateProbeHelpers() {
  if (!parameters.showProbes) { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  if (!gi || gi.hasData?.() === false || typeof gi.getResolution !== 'function') { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  const res = gi.getResolution(); const bounds = gi.getBounds?.();
  if (!res || !bounds) { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  const rx = Math.max(1, Math.round(res.x)), ry = Math.max(1, Math.round(res.y)), rz = Math.max(1, Math.round(res.z));
  const total = rx * ry * rz;
  const min = bounds.min, size = _pgVec.subVectors(bounds.max, bounds.min);
  const sig = `${rx},${ry},${rz}|${min.x.toFixed(1)},${min.y.toFixed(1)},${min.z.toFixed(1)}|${size.x.toFixed(1)},${size.y.toFixed(1)},${size.z.toFixed(1)}`;
  if (sig === probeHelperSig && probeHelperMesh) { probeHelperMesh.visible = true; return; }
  probeHelperSig = sig;
  if (!probeHelperMesh || probeHelperMesh.count !== total) {
    if (probeHelperMesh) { scene.remove(probeHelperMesh); probeHelperMesh.geometry.dispose(); probeHelperMesh.material.dispose(); }
    const cell = Math.max(size.x / Math.max(1, rx - 1), size.y / Math.max(1, ry - 1), size.z / Math.max(1, rz - 1));
    const geo = new THREE.SphereGeometry(cell * 0.06 + 1e-3, 8, 6);
    const mat = new THREE.MeshBasicMaterial({ color: 0x33ddff, depthWrite: false, transparent: true, opacity: 0.85, toneMapped: false });
    probeHelperMesh = new THREE.InstancedMesh(geo, mat, total);
    probeHelperMesh.frustumCulled = false; probeHelperMesh.renderOrder = 9999;
    probeHelperMesh.userData.maxjsVisible = false;
    scene.add(probeHelperMesh);
  }
  let idx = 0;
  for (let k = 0; k < rz; k++) for (let j = 0; j < ry; j++) for (let i = 0; i < rx; i++) {
    const fx = rx > 1 ? i / (rx - 1) : 0, fy = ry > 1 ? j / (ry - 1) : 0, fz = rz > 1 ? k / (rz - 1) : 0;
    _pgMat.makeTranslation(min.x + fx * size.x, min.y + fy * size.y, min.z + fz * size.z);
    probeHelperMesh.setMatrixAt(idx++, _pgMat);
  }
  probeHelperMesh.instanceMatrix.needsUpdate = true;
  probeHelperMesh.visible = true;
}

// ── Render loop — direct render (no bloom / no AO / no post-FX), only SPEEDBALL GI ───
const giStatEl = document.getElementById('gi-stat');
let statMs = 0;
renderer.setAnimationLoop((nowMs) => {
  timer.update();
  controls.update(timer.getDelta());
  if (cameraIsMoving()) { lastInteractionMs = nowMs; scheduleSave(); }
  gi?.tick({ idleMs: nowMs - lastInteractionMs, playing: false });
  updateProbeHelpers();
  renderer.render(scene, camera);
  if (gi && nowMs - statMs > 250) {
    statMs = nowMs;
    const s = gi.getStats?.();
    giStatEl.textContent = s ? `GI: probes ${s.probes} (${s.res.x}×${s.res.y}×${s.res.z}) · active ${s.active}` : 'GI: building…';
  }
});
</script>
</body>
</html>
