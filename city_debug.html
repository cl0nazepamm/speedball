<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SPEEDBALL GI — City Math Debug</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/concrete_connect.css">
<style>
  /* Concrete Connect / E16 branding (see css/concrete_connect.css). */
  :root { --mono: 'JetBrains Mono', ui-monospace, "Cascadia Code", Menlo, monospace; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #9a9a9a; color: #111;
    font: 12px/1.5 var(--mono); }
  #c { display: block; width: 100vw; height: 100vh; }

  /* ── HUD: clean text overlay (no panel) ─────────────────────────────────── */
  #hud { position: fixed; left: 14px; top: 12px; pointer-events: none; max-width: 46ch; z-index: 10;
    color: #f2f2f2; text-shadow: 0 1px 2px #000, 0 0 2px #000c; }
  #hud .title { font: 800 13px/1.5 Verdana, system-ui, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
  #hud .sub { color: #d6d6d6; }
	  #hud #gi-stat { display: inline-block; margin-top: 6px; color: #9fd2ff; }
	  #hud #gi-debug { display: inline-block; margin-top: 2px; color: #d7efb5; }

  /* ── status / loading overlay ───────────────────────────────────────────── */
  #status { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    padding: 14px 22px; color: #111; white-space: pre; text-align: center;
    background: linear-gradient(to bottom, #eeeeee, #b8b8b8); border: 1px solid #242424; border-radius: 6px;
    box-shadow: 6px 8px 20px rgba(0,0,0,0.45), inset 1px 1px 2px rgba(255,255,255,0.9);
    font: 700 11px/1.5 var(--mono); text-shadow: 1px 1px 0 #fff; }
  #status.err { border-color: #6b2330; color: #7a0e1c; background: linear-gradient(to bottom, #f0dede, #cc9a9a); text-shadow: none; }
  #status.hide { display: none; }

  /* ── lil-gui: concrete skin ─────────────────────────────────────────────── */
  .lil-gui { --width: 300px; --font-size: 11px;
    --background-color: #cccccc; --text-color: #141414;
    --title-background-color: #b8b8b8; --title-text-color: #050505;
    --widget-color: #909090; --hover-color: #9e9e9e; --focus-color: #ababab;
    --number-color: #0b3d6b; --string-color: #3a5f2a;
    --font-family: Verdana, system-ui, sans-serif; --font-family-mono: var(--mono);
    --widget-height: 20px; }
  .lil-gui.root { border: 1px solid #242424; border-radius: 8px 8px 3px 3px;
    background: linear-gradient(to bottom, #e4e4e4, #bcbcbc);
    box-shadow: 7px 9px 24px rgba(0,0,0,0.48), inset 1px 1px 2px rgba(255,255,255,0.96); }
  .lil-gui.root > .title { background: linear-gradient(to bottom, #d9d9d9 0%, #bdbdbd 44%, #8f8f8f 50%, #b8b8b8 100%);
    border-bottom: 1px solid #555; color: #050505; text-shadow: 1px 1px 0 #fff;
    font: 800 11px/1 Verdana, system-ui, sans-serif; letter-spacing: 0.10em; text-transform: uppercase; }
  .lil-gui .children { background: transparent; }
  .lil-gui .title { text-shadow: 1px 1px 0 rgba(255,255,255,0.45); }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three-r185/build/three.webgpu.js",
    "three/webgpu": "./vendor/three-r185/build/three.webgpu.js",
    "three/tsl": "./vendor/three-r185/build/three.tsl.js",
    "three/addons/": "./vendor/three-r185/examples/",
    "three-mesh-bvh": "./node_modules/three-mesh-bvh/src/index.js"
  },
  "scopes": {
    "./node_modules/three-mesh-bvh/": { "three": "./vendor/three-r185/build/three.module.js" }
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="title">SPEEDBALL GI · City Debug</div>
  <span class="sub">math isolation page · no saved settings</span><br>
  <span class="sub">WASD + drag to look · all knobs are disposable</span><br>
	  <span class="sub" id="gi-stat">GI: starting…</span><br>
	  <span class="sub" id="gi-debug">debug state: waiting…</span>
</div>
<div id="status">initializing WebGPU…</div>

<script type="module">
import * as THREE from 'three';
import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
import { SkyMesh } from 'three/addons/objects/SkyMesh.js';
import { Inspector } from 'three/addons/inspector/Inspector.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';
import { positionWorld, normalWorld } from 'three/tsl';
import { createProbeField, giLights } from './js/index.js';
import { GI_DEFAULTS, applyGiSettings, addGiPanel } from './js/gi_settings.js';
import { CityGenerator, createBuildingMaterial, createRoadMaterial } from 'three/addons/generators/CityGenerator.js';

const statusEl = document.getElementById('status');
const setStatus = (msg, err = false) => { statusEl.textContent = msg; statusEl.classList.toggle('err', err); statusEl.classList.remove('hide'); };
const hideStatus = () => statusEl.classList.add('hide');
window.addEventListener('error', (e) => setStatus('Error:\n' + (e.error?.stack || e.message), true));
window.addEventListener('unhandledrejection', (e) => setStatus('Error:\n' + (e.reason?.stack || e.reason), true));
const DIAG = true;

// ── Renderer (matches webgpu_generator_city) ──────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGPURenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.45;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.inspector = new Inspector();        // performance metric (CPU/GPU/FPS), same as the example
await renderer.init();
if (renderer.backend?.isWebGPUBackend !== true) {
  setStatus('WebGPU not available.\nThis demo needs a WebGPU-capable browser\n(Chrome/Edge 121+, or Firefox Nightly).', true);
  throw new Error('WebGPU unavailable');
}

// ── SPEEDBALL GI lighting node — install BEFORE any material compiles ──────────────
renderer.lighting.createNode = (lights = []) => giLights({
  maxDirectionalLights: 4, maxPointLights: 16, maxSpotLights: 16, maxHemisphereLights: 2,
}).setLights(lights);

const pmremGenerator = new THREE.PMREMGenerator(renderer);

const scene = new THREE.Scene();
scene.environmentIntensity = 0.2;            // matches the example (sky IBL strength)

const BASE_CAMERA_NEAR = 1;
const BASE_CAMERA_FAR = 20000;
const BASE_CAMERA_POS = new THREE.Vector3(-35, 55, -100);
const BASE_CAMERA_LOOK = new THREE.Vector3(35, 55, 0);
const BASE_MOVE_SPEED = 15;
const BASE_SUN_DISTANCE = 600;
const BASE_SHADOW = { left: -280, right: 280, top: 360, bottom: -40, far: 2400 };
let gi = null;

// ── Sky (matches the example exactly) ─────────────────────────────────────────
const sky = new SkyMesh();
sky.scale.setScalar(10000);
sky.turbidity.value = 8;
sky.rayleigh.value = 3;
sky.mieCoefficient.value = 0.008;
sky.mieDirectionalG.value = 0.88;
sky.userData.maxjsVisible = false;           // keep the sky OUT of the GI BVH
const sun = new THREE.Vector3();
const envScene = new THREE.Scene();
let cityEnvironment = null;
let diag = null;

// ── Camera + controls (matches the example) ───────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, BASE_CAMERA_NEAR, BASE_CAMERA_FAR);
camera.position.copy(BASE_CAMERA_POS);
const controls = new FirstPersonControls(camera, renderer.domElement);
controls.movementSpeed = BASE_MOVE_SPEED;
controls.lookSpeed = 0.25;
controls.lookAt(BASE_CAMERA_LOOK);
const timer = new THREE.Timer();

// GI idle tracking (defined early — generateCity/updateSun call markInteraction).
let lastInteractionMs = 0;
const markInteraction = () => { lastInteractionMs = performance.now(); };

// ── Sun light + shadows (matches the example) ─────────────────────────────────
const sunLight = new THREE.DirectionalLight();
sunLight.castShadow = true;
sunLight.shadow.camera.left = BASE_SHADOW.left; sunLight.shadow.camera.right = BASE_SHADOW.right;
sunLight.shadow.camera.top = BASE_SHADOW.top; sunLight.shadow.camera.bottom = BASE_SHADOW.bottom;
sunLight.shadow.camera.far = BASE_SHADOW.far;
sunLight.shadow.mapSize.set(4096, 4096);
sunLight.shadow.bias = -0.0004;
scene.add(sunLight);

// ── Procedural city (generated at RUNTIME — no GLB) ────────────────────────────
const parameters = {
  seed: 94, timeOfDay: 12, exposure: 0.45,   // noon = bright (was dawn/dim); overridden by saved state
  showTrees: true, showCars: true,
  // Debug page: start from canonical defaults only. Do not read or write the
  // shared GI settings store while chasing a transient artifact.
  ...GI_DEFAULTS,
};

let cityGroup = null;
const city = new CityGenerator({ seed: parameters.seed });
// DEBUG: flat untextured materials (flicker isolation) — set false to restore the
// procedural building/road looks.
const DEBUG_FLAT_MATERIALS = true;
const materials = { building: DEBUG_FLAT_MATERIALS
  ? new THREE.MeshStandardMaterial({ color: 0xb0a99a, roughness: 0.9 })
  : createBuildingMaterial(city.layout, parameters.seed) };
// The building/road looks are node-driven (colorNode), so the GI trace can't read
// them — give the packer representative albedos (visual untouched, colorNode wins).
materials.building.userData.giColor = 0xb0a99a;   // limestone average of the tower palette

// NOTE: mrdoob's webgpu city example ships each building set as ONE merged mesh with a
// partId vertex attribute switching the look per zone. For THIS demo the emissive
// meshes (GLASS panes, partId 4) are separated into their own geometry group + material
// instance below (separateEmissiveGlass), so the GI trace sees the actual window panes
// as area lights — local warm spill with real falloff, instead of a facade-wide
// average that lit the whole city. Identical construction → identical on-screen look.
const GLASS_PART_ID = 4;
materials.buildingGlass = DEBUG_FLAT_MATERIALS
  ? new THREE.MeshStandardMaterial({ color: 0x22282e, roughness: 0.3 })
  : createBuildingMaterial(city.layout, parameters.seed);
materials.buildingGlass.userData.giColor = 0x22282e;                        // dark glass albedo
// materials.buildingGlass.userData.giEmissive = new THREE.Color(0.5, 0.34, 0.16); // avg pane emission — OFF while debugging

function separateEmissiveGlass(group) {
  group.traverse((o) => {
    if (!o.isMesh || !o.geometry?.attributes?.partId || o.userData.glassSeparated) return;
    o.userData.glassSeparated = true;
    const g = o.geometry;
    const part = g.attributes.partId.array;
    const src = g.index ? g.index.array : null;
    const triCount = ((src ? src.length : g.attributes.position.count) / 3) | 0;
    const wall = [], glass = [];
    for (let t = 0; t < triCount; t++) {
      const i0 = t * 3;
      const a = src ? src[i0] : i0;
      const dst = part[a] === GLASS_PART_ID ? glass : wall;
      if (src) dst.push(src[i0], src[i0 + 1], src[i0 + 2]);
      else dst.push(i0, i0 + 1, i0 + 2);
    }
    g.setIndex(new THREE.BufferAttribute(new Uint32Array([...wall, ...glass]), 1));
    g.clearGroups();
    g.addGroup(0, wall.length, 0);
    g.addGroup(wall.length, glass.length, 1);
    o.material = [materials.building, materials.buildingGlass];
  });
}

// SPEEDBALL GI traces packed scalar PBR; the procedural buildings import metallic, which
// kills diffuse bounce (metals don't bounce Lambert) — the Sponza trap. Normalise the
// trace-side scalar to dielectric so the city actually bounces. Node visual is untouched.
function prepMaterials(o) {
  const ms = Array.isArray(o.material) ? o.material : (o.material ? [o.material] : []);
  for (const m of ms) {
    if (!m || m.userData?.speedballGiPrepared) continue;
    m.userData = m.userData || {}; m.userData.speedballGiPrepared = true;
    if (Number.isFinite(m.metalness) && m.metalness > 0.5) { m.metalness = 0; m.needsUpdate = true; }
    if (Number.isFinite(m.roughness) && m.roughness < 0.6) { m.roughness = 0.6; m.needsUpdate = true; }
  }
}

// ── Procedural street props: trees on the curbs, cars in the lanes ─────────────
// Instanced + seeded (deterministic per city seed), cast/receive shadows, and picked
// up by the SPEEDBALL GI BVH — so green canopy + car paint actually bounce colour.
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// low-poly geometry (built once; shared across regenerations — never disposed)
const _treeTrunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 3.4, 6).translate(0, 1.7, 0);
const _treeLeafGeo  = new THREE.ConeGeometry(2.6, 6.0, 8).translate(0, 5.6, 0);
const _carBodyGeo   = new THREE.BoxGeometry(4.4, 1.1, 2.0).translate(0, 1.25, 0);
const _carCabinGeo  = new THREE.BoxGeometry(2.2, 0.9, 1.7).translate(-0.25, 2.05, 0);
const _carWheelGeo  = new THREE.CylinderGeometry(0.55, 0.55, 0.45, 10).rotateX(Math.PI / 2); // axle → Z
const _propMat = {
  trunk: new THREE.MeshStandardMaterial({ color: 0x5a4632, roughness: 0.95 }),
  leaf:  new THREE.MeshStandardMaterial({ color: 0x3f6b2e, roughness: 0.85 }),
  body:  new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.35, metalness: 0.0 }),
  cabin: new THREE.MeshStandardMaterial({ color: 0x243038, roughness: 0.25, metalness: 0.0 }),
  wheel: new THREE.MeshStandardMaterial({ color: 0x0e0f11, roughness: 0.85 }),
};
const CAR_COLORS = [0xb63b34, 0x2f5aa8, 0xd9d9d9, 0x1b1c1e, 0xc7a233, 0x3a7d54, 0xe8e8ee];
const _ppM4 = new THREE.Matrix4(), _ppOff = new THREE.Matrix4(), _ppQ = new THREE.Quaternion();
const _ppV = new THREE.Vector3(), _ppS = new THREE.Vector3(), _ppUp = new THREE.Vector3(0, 1, 0), _ppCol = new THREE.Color();
let propsGroup = null;

function makeInst(geo, mat, mats, colors) {
  if (!mats.length) return null;
  const im = new THREE.InstancedMesh(geo, mat, mats.length);
  for (let i = 0; i < mats.length; i++) im.setMatrixAt(i, mats[i]);
  if (colors) { for (let i = 0; i < colors.length; i++) im.setColorAt(i, _ppCol.setHex(colors[i])); im.instanceColor.needsUpdate = true; }
  im.instanceMatrix.needsUpdate = true;
  im.castShadow = true; im.receiveShadow = true;
  im.computeBoundingBox(); im.computeBoundingSphere();
  prepMaterials(im);
  return im;
}

function generateProps() {
  if (propsGroup) { scene.remove(propsGroup); propsGroup.traverse((o) => { if (o.isInstancedMesh) o.dispose(); }); propsGroup = null; }
  const L = city.layout;
  const rnd = mulberry32((Math.round(parameters.seed) * 2654435761) >>> 0);
  const halfW = L.cityW / 2, halfD = L.cityD / 2;
  const blkX = (bx) => -halfW + bx * (L.blockW + L.street);
  const blkZ = (bz) => -halfD + bz * (L.blockD + L.street);
  propsGroup = new THREE.Group(); propsGroup.name = 'CityProps';

  // trees: line every block edge at the curb (both sides of each street get lined)
  const treeMats = [];
  if (parameters.showTrees) {
    const off = 1.5, step = 8.5;
    for (let bx = 0; bx < L.blocksX; bx++) for (let bz = 0; bz < L.blocksZ; bz++) {
      const x0 = blkX(bx), x1 = x0 + L.blockW, z0 = blkZ(bz), z1 = z0 + L.blockD;
      const edges = [
        { ax: 'x', a: x0, b: x1, fix: z0 - off }, { ax: 'x', a: x0, b: x1, fix: z1 + off },
        { ax: 'z', a: z0, b: z1, fix: x0 - off }, { ax: 'z', a: z0, b: z1, fix: x1 + off },
      ];
      for (const e of edges) {
        const len = e.b - e.a, n = Math.max(1, Math.floor(len / step));
        for (let i = 0; i <= n; i++) {
          if (rnd() < 0.30) continue;
          const along = e.a + (n > 0 ? i / n : 0.5) * len + (rnd() - 0.5) * 2.0;
          const px = e.ax === 'x' ? along : e.fix, pz = e.ax === 'x' ? e.fix : along;
          const sc = 0.8 + rnd() * 0.7;
          _ppQ.setFromAxisAngle(_ppUp, rnd() * Math.PI * 2);
          _ppM4.compose(_ppV.set(px, 0, pz), _ppQ, _ppS.set(sc, sc, sc));
          treeMats.push(_ppM4.clone());
        }
      }
    }
  }

  // cars: two lanes down each street centerline; skip the intersections
  const carMats = [], carCols = [], wheelMats = [];
  if (parameters.showCars) {
    const laneOff = L.street * 0.16, step = 15;
    const streetsX = [-halfW - L.street / 2, halfW + L.street / 2];
    for (let bx = 0; bx < L.blocksX - 1; bx++) streetsX.push(blkX(bx) + L.blockW + L.street / 2);
    const streetsZ = [-halfD - L.street / 2, halfD + L.street / 2];
    for (let bz = 0; bz < L.blocksZ - 1; bz++) streetsZ.push(blkZ(bz) + L.blockD + L.street / 2);
    const spanX = halfW + L.street * 0.6, spanZ = halfD + L.street * 0.6;
    const nearAny = (v, arr, tol) => arr.some((c) => Math.abs(v - c) < tol);
    const addCar = (px, pz, rotY) => {
      _ppQ.setFromAxisAngle(_ppUp, rotY);
      _ppM4.compose(_ppV.set(px, 0, pz), _ppQ, _ppS.set(1, 1, 1));
      carMats.push(_ppM4.clone());
      carCols.push(CAR_COLORS[(rnd() * CAR_COLORS.length) | 0]);
      const wl = [[1.35, 0.55, 0.95], [1.35, 0.55, -0.95], [-1.35, 0.55, 0.95], [-1.35, 0.55, -0.95]];
      for (const w of wl) wheelMats.push(_ppM4.clone().multiply(_ppOff.makeTranslation(w[0], w[1], w[2])));
    };
    for (const xc of streetsX) for (const lane of [-1, 1]) {
      const px = xc + lane * laneOff, rotY = lane > 0 ? Math.PI / 2 : -Math.PI / 2;
      for (let z = -spanZ; z <= spanZ; z += step) {
        if (rnd() < 0.5 || nearAny(z, streetsZ, L.street * 0.7)) continue;
        addCar(px, z + (rnd() - 0.5) * 4, rotY);
      }
    }
    for (const zc of streetsZ) for (const lane of [-1, 1]) {
      const pz = zc + lane * laneOff, rotY = lane > 0 ? 0 : Math.PI;
      for (let x = -spanX; x <= spanX; x += step) {
        if (rnd() < 0.5 || nearAny(x, streetsX, L.street * 0.7)) continue;
        addCar(x + (rnd() - 0.5) * 4, pz, rotY);
      }
    }
  }

  const add = (im) => { if (im) propsGroup.add(im); };
  add(makeInst(_treeTrunkGeo, _propMat.trunk, treeMats));
  add(makeInst(_treeLeafGeo, _propMat.leaf, treeMats));
  add(makeInst(_carBodyGeo, _propMat.body, carMats, carCols));
  add(makeInst(_carCabinGeo, _propMat.cabin, carMats));
  add(makeInst(_carWheelGeo, _propMat.wheel, wheelMats));
  scene.add(propsGroup);
}

function generateCity() {
  if (cityGroup) scene.remove(cityGroup);
  city.parameters.seed = parameters.seed;
  cityGroup = city.build(materials);
  if (!window.__noGlassSplit) separateEmissiveGlass(cityGroup);   // demo-only: glass panes → own group/material so GI sees them as area lights
  cityGroup.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; prepMaterials(o); } });
  scene.add(cityGroup);
  generateProps();
  gi?.requestRebuild();
  markInteraction();
}

const floorW = city.layout.cityW + 2 * city.layout.street;
const floorD = city.layout.cityD + 2 * city.layout.street;
const ground = new THREE.Mesh(new THREE.PlaneGeometry(floorW, floorD).rotateX(-Math.PI / 2), DEBUG_FLAT_MATERIALS
  ? new THREE.MeshStandardMaterial({ color: 0x30343a, roughness: 0.95 })
  : createRoadMaterial(city.layout));
ground.material.userData.giColor = 0x30343a;      // wet-asphalt average (road look is node-driven too)
ground.receiveShadow = true;
prepMaterials(ground);
scene.add(ground);
generateCity();

// ── Sun placement / sky env (matches the example) ─────────────────────────────
const _warm = new THREE.Color(0xffb072), _cool = new THREE.Color(0xfff4e8);
function updateSun() {
  const t = parameters.timeOfDay;
  const u = (t - 12) / 6;
  const elevation = Math.max(0, 1 - u * u) * 72;
  const azimuth = 90 - u * 55;
  sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(90 - elevation), THREE.MathUtils.degToRad(azimuth));
  sky.sunPosition.value.copy(sun);

  const sinE = Math.sin(THREE.MathUtils.degToRad(elevation));
  const transmittance = Math.sqrt(Math.max(sinE, 0));
  sunLight.color.copy(_warm).lerp(_cool, transmittance);
  sunLight.intensity = 6 * transmittance;
  sunLight.position.copy(sun).multiplyScalar(BASE_SUN_DISTANCE);

  sky.showSunDisc.value = false;
  envScene.add(sky);
  const env = pmremGenerator.fromScene(envScene).texture;
  if (scene.environment) scene.environment.dispose();
  cityEnvironment = env;
  scene.environment = diag?.environment === false ? null : env;
  sky.showSunDisc.value = true;
  scene.add(sky);

  markInteraction();
}
updateSun();

// ── GI idle gate via camera transform (FirstPersonControls is drag-to-look, so the
// camera settles when you let go → GI converges; world-space GI holds static while moving)
const _prevPos = new THREE.Vector3(Infinity, 0, 0), _prevQuat = new THREE.Quaternion(2, 0, 0, 0);
function cameraIsMoving() {
  const moved = camera.position.distanceToSquared(_prevPos) > 1e-7 || Math.abs(camera.quaternion.dot(_prevQuat)) < 0.99999995;
  _prevPos.copy(camera.position); _prevQuat.copy(camera.quaternion);
  return moved;
}
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  markInteraction();
});

// ── SPEEDBALL GI probe field over the runtime city (NO post-processing — only GI) ───
function markGiMaterialsDirty({ forceLightingRefresh = false } = {}) {
  if (forceLightingRefresh) gi?.forceLightingRefresh?.();
  const seen = new WeakSet();
  const mark = (m) => {
    if (!m || seen.has(m)) return; seen.add(m);
    if (m.isMeshBasicMaterial || m.isLineBasicMaterial || m.visible === false) return;
    m.dispose?.(); m.needsUpdate = true; // needsUpdate alone doesn't rebuild the node graph here
  };
  scene.traverse((o) => { if (!o.material) return; (Array.isArray(o.material) ? o.material : [o.material]).forEach(mark); });
}

let debugDirtyPending = false;
let debugDirtyReadyAt = 0;
let debugDirtyAttempts = 0;
function markDebugDirtyAfterFinish() {
  debugDirtyPending = true;
  debugDirtyReadyAt = performance.now() + 300;
  debugDirtyAttempts = 0;
  markInteraction();
}
function flushDebugDirty(nowMs) {
  if (!debugDirtyPending || nowMs < debugDirtyReadyAt) return;
  if (gi?.hasData?.() === false || gi?.node?.active !== true) {
    debugDirtyAttempts++;
    debugDirtyReadyAt = nowMs + Math.min(1000, 120 + debugDirtyAttempts * 80);
    return;
  }
  debugDirtyPending = false;
  markGiMaterialsDirty({ forceLightingRefresh: true });
  markInteraction();
}
function attachDebugDirtyOnFinish(gui) {
  for (const c of gui.controllersRecursive()) {
    if (typeof c.onFinishChange === 'function') c.onFinishChange(markDebugDirtyAfterFinish);
  }
}

// ── Probe helper spheres (diagnostic) ──────────────────────────────────────────
let probeHelperMesh = null, probeHelperSig = '';
const _pgVec = new THREE.Vector3(), _pgMat = new THREE.Matrix4();
// Probe spheres show their REAL captured color: each fragment samples the GI field
// at the sphere surface along its own normal. Falls back to a neutral tint until the
// atlas is bound.
function makeProbeHelperMaterial(lit) {
  if (!lit) return new THREE.MeshBasicMaterial({ color: 0x808080, depthWrite: false, transparent: true, opacity: 0.85, toneMapped: false });
  const n = gi.node;
  const P = positionWorld.add(normalWorld.mul(n.normalBiasNode[0]));
  const mat = new THREE.MeshBasicNodeMaterial({ depthWrite: false, transparent: true, opacity: 0.95 });
  mat.colorNode = n.sampleIrradiance(P, normalWorld).max(0.0);
  return mat;
}
function updateProbeHelpers() {
  if (!parameters.showProbes) { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  if (!gi || gi.hasData?.() === false || typeof gi.getResolution !== 'function') { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  const res = gi.getResolution(); const bounds = gi.getBounds?.();
  if (!res || !bounds) { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  const rx = Math.max(1, Math.round(res.x)), ry = Math.max(1, Math.round(res.y)), rz = Math.max(1, Math.round(res.z));
  const total = rx * ry * rz;
  const min = bounds.min, size = _pgVec.subVectors(bounds.max, bounds.min);
  const lit = gi.node?.active === true;   // atlas bound → can show each probe's real captured color
  const sig = `${rx},${ry},${rz}|${min.x.toFixed(1)},${min.y.toFixed(1)},${min.z.toFixed(1)}|${size.x.toFixed(1)},${size.y.toFixed(1)},${size.z.toFixed(1)}|${lit ? 1 : 0}`;
  if (sig === probeHelperSig && probeHelperMesh) { probeHelperMesh.visible = true; return; }
  probeHelperSig = sig;
  if (!probeHelperMesh || probeHelperMesh.count !== total || probeHelperMesh._lit !== lit) {
    if (probeHelperMesh) { scene.remove(probeHelperMesh); probeHelperMesh.geometry.dispose(); probeHelperMesh.material.dispose(); }
    const cell = Math.max(size.x / Math.max(1, rx - 1), size.y / Math.max(1, ry - 1), size.z / Math.max(1, rz - 1));
    const geo = new THREE.SphereGeometry(cell * 0.06 + 1e-3, 8, 6);
    const mat = makeProbeHelperMaterial(lit);
    probeHelperMesh = new THREE.InstancedMesh(geo, mat, total);
    probeHelperMesh._lit = lit;
    probeHelperMesh.frustumCulled = false; probeHelperMesh.renderOrder = 9999;
    probeHelperMesh.userData.maxjsVisible = false;
    scene.add(probeHelperMesh);
  }
  let idx = 0;
  for (let k = 0; k < rz; k++) for (let j = 0; j < ry; j++) for (let i = 0; i < rx; i++) {
    const fx = rx > 1 ? i / (rx - 1) : 0, fy = ry > 1 ? j / (ry - 1) : 0, fz = rz > 1 ? k / (rz - 1) : 0;
    _pgMat.makeTranslation(min.x + fx * size.x, min.y + fy * size.y, min.z + fz * size.z);
    probeHelperMesh.setMatrixAt(idx++, _pgMat);
  }
  probeHelperMesh.instanceMatrix.needsUpdate = true;
  probeHelperMesh.visible = true;
}

// ── Render loop — direct render (no bloom / no AO / no post-FX), only SPEEDBALL GI ───
const giStatEl = document.getElementById('gi-stat');
const giDebugEl = document.getElementById('gi-debug');
let statMs = 0;
renderer.setAnimationLoop((nowMs) => {
  timer.update();
  controls.update(timer.getDelta());
  const camMoving = cameraIsMoving();
  if (camMoving) { lastInteractionMs = nowMs; scheduleSave(); }
  if (!diag?.freezeGiTick) gi?.tick({ idleMs: nowMs - lastInteractionMs, playing: false });
  flushDebugDirty(nowMs);
  updateProbeHelpers();
  renderer.render(scene, camera);
  if (gi && nowMs - statMs > 250) {
    statMs = nowMs;
    const s = gi.getStats?.();
    giStatEl.textContent = s ? `GI: probes ${s.probes} (${s.res.x}×${s.res.y}×${s.res.z}) · active ${s.active}` : 'GI: building…';
    const d = gi._debugState?.();
    if (d) {
      const idle = Number.isFinite(d.idleMs) ? Math.round(d.idleMs) : '∞';
      const c0 = d.cascadeState?.[0], c1 = d.cascadeState?.[1];
      const flags = [
        camMoving ? 'cam moving' : 'cam still',
        d.moving ? 'GI moving' : 'GI idle',
        d.restOnly ? 'rest paths on' : 'rest paths held',
        d.inFlight ? 'in flight' : 'ready',
        d.dirty ? 'dirty' : 'clean',
      ].join(' · ');
      giDebugEl.textContent =
        `idle ${idle}ms · ${flags} · reactive ${d.reactiveTicks} · stage ${d.buildStage}` +
        ` · jitter ${Number(d.frameJitter || 0).toFixed(3)} · budget ${d.tickBudgetRays}` +
        ` · solve [${d.solveList || '-'}] · c0 ${c0?.cursor ?? '-'}${c0?.needsClear ? '/clear' : ''}${c0?.needsClassify ? '/classify' : ''}` +
        ` · c1 ${c1?.cursor ?? '-'}${c1?.needsClear ? '/clear' : ''}${c1?.needsClassify ? '/classify' : ''}`;
    }
  }
});
