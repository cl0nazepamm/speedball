<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SPEEDBALL GI — standalone (WebGPU DDGI + Sky)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/concrete_connect.css">
<style>
  /* Concrete Connect / E16 branding (see css/concrete_connect.css). */
  :root { --mono: 'JetBrains Mono', ui-monospace, "Cascadia Code", Menlo, monospace; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #9a9a9a; color: #111;
    font: 12px/1.5 var(--mono); }
  #c { display: block; width: 100vw; height: 100vh; }

  /* ── HUD: clean text overlay (no panel) ─────────────────────────────────── */
  #hud { position: fixed; left: 14px; top: 12px; pointer-events: none; max-width: 46ch; z-index: 10;
    color: #f2f2f2; text-shadow: 0 1px 2px #000, 0 0 2px #000c; }
  #hud .title { font: 800 13px/1.5 Verdana, system-ui, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; }
  #hud .sub { color: #d6d6d6; }

  /* ── status / loading overlay ───────────────────────────────────────────── */
  #status { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    padding: 14px 22px; color: #111; white-space: pre; text-align: center;
    background: linear-gradient(to bottom, #eeeeee, #b8b8b8); border: 1px solid #242424; border-radius: 6px;
    box-shadow: 6px 8px 20px rgba(0,0,0,0.45), inset 1px 1px 2px rgba(255,255,255,0.9);
    font: 700 11px/1.5 var(--mono); text-shadow: 1px 1px 0 #fff; }
  #status.err { border-color: #6b2330; color: #7a0e1c; background: linear-gradient(to bottom, #f0dede, #cc9a9a); text-shadow: none; }
  #status.hide { display: none; }

  /* ── lil-gui: concrete skin ─────────────────────────────────────────────── */
  .lil-gui { --width: 300px; --font-size: 11px;
    --background-color: #cccccc; --text-color: #141414;
    --title-background-color: #b8b8b8; --title-text-color: #050505;
    --widget-color: #909090; --hover-color: #9e9e9e; --focus-color: #ababab;
    --number-color: #0b3d6b; --string-color: #3a5f2a;
    --font-family: Verdana, system-ui, sans-serif; --font-family-mono: var(--mono);
    --widget-height: 20px; }
  .lil-gui.root { border: 1px solid #242424; border-radius: 8px 8px 3px 3px;
    background: linear-gradient(to bottom, #e4e4e4, #bcbcbc);
    box-shadow: 7px 9px 24px rgba(0,0,0,0.48), inset 1px 1px 2px rgba(255,255,255,0.96); }
  .lil-gui.root > .title { background: linear-gradient(to bottom, #d9d9d9 0%, #bdbdbd 44%, #8f8f8f 50%, #b8b8b8 100%);
    border-bottom: 1px solid #555; color: #050505; text-shadow: 1px 1px 0 #fff;
    font: 800 11px/1 Verdana, system-ui, sans-serif; letter-spacing: 0.10em; text-transform: uppercase; }
  .lil-gui .children { background: transparent; }
  .lil-gui .title { text-shadow: 1px 1px 0 rgba(255,255,255,0.45); }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.tsl.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/",
    "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.3/build/index.module.js",
    "powershot-threejs": "https://cdn.jsdelivr.net/npm/powershot-threejs@0.3.1/src/index.js"
  },
  "scopes": {
    "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.3/": { "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js" }
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="title">SPEEDBALL GI</div>
  <span class="sub">drag to orbit · scroll to zoom · sun = azimuth/elevation</span>
</div>
<div id="status">initializing WebGPU…</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { SkyMesh } from 'three/addons/objects/SkyMesh.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';
import { positionWorld, normalWorld, pass, renderOutput } from 'three/tsl';
import { FilmPipeline, FILM_PRESETS, FILM_PRESET_KEYS, applyFilmPreset, filmPass } from 'powershot-threejs';
import { installSpeedballGI, excludeFromGI } from './js/index.js';
import { loadGiSettings, saveGiSettings, applyGiSettings, addGiPanel } from './js/gi_settings.js';

const statusEl = document.getElementById('status');
const setStatus = (msg, err = false) => { statusEl.textContent = msg; statusEl.classList.toggle('err', err); statusEl.classList.remove('hide'); };
const hideStatus = () => statusEl.classList.add('hide');
window.addEventListener('error', (e) => setStatus('Error:\n' + (e.error?.stack || e.message), true));
window.addEventListener('unhandledrejection', (e) => setStatus('Error:\n' + (e.reason?.stack || e.reason), true));

// ── Renderer ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGPURenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.NeutralToneMapping;
renderer.toneMappingExposure = 0.7;
await renderer.init();
if (renderer.backend?.isWebGPUBackend !== true) {
  setStatus('WebGPU not available.\nThis demo needs a WebGPU-capable browser\n(Chrome/Edge 121+, or Firefox Nightly).', true);
  throw new Error('WebGPU unavailable');
}

// SPEEDBALL GI is installed in one call further down (installSpeedballGI), which
// wires the lights factory, the material-dirty pass, and idle-gated solving.

// ── Scene & camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.05, 4000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// ── Sky (Preetham, WebGPU) + sun ──────────────────────────────────────────────
const sky = new SkyMesh();
sky.scale.setScalar(1500);                 // within the camera far plane (no z-precision hit)
excludeFromGI(sky);                         // keep the sky OUT of the GI BVH / auto-fit
scene.add(sky);

const sun = new THREE.DirectionalLight(0xffffff, 3.2);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.05;
scene.add(sun);
scene.add(sun.target);

// Tiny pre-convergence safety fill; SPEEDBALL probes carry the real sky ambient.
const hemi = new THREE.HemisphereLight(0x9fc6ff, 0x4a4036, 0.05);
scene.add(hemi);

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ── Parameters & controls ─────────────────────────────────────────────────────
const params = {
  azimuth: 103, elevation: 66, turbidity: 6, rayleigh: 1,
  sunIntensity: 50, exposure: 0.7,
  giEnabled: true, giIntensity: 10, giDivisions: 16, giCascades: 1, giContinuous: true, showProbes: false,
  // quality knobs (defaults mirror gi_probes.js). smoothness is pinned to 1 (no slider).
  giRays: 64, giHysteresis: 0.6, giNormalBias: 1.75,
  giRadianceClamp: 8, giDepthSharpness: 40, giLeak: 0.5, giSolid: 0,
  giChangeThreshold: 2.5, giSnapAmount: 0.30, giFireflyClamp: 6.0,   // adaptive temporal blend
  // Centered Sponza corridor hero view.
  camX: 1.1982, camY: 4.5833, camZ: -3.463,
  targetX: -3.2952, targetY: 4.4996, targetZ: -3.2815,
  // PowerShot film emulation (experimental — not persisted). Tuned baseline applies
  // after the Kodak stock preset so the sliders and shader uniforms agree on load.
  filmEnabled: false, filmStock: 'kodak_500t', filmAmount: 1.0, filmExposure: -0.37, filmGamma: 0.93,
  filmGrain: 1.2, filmGrainSize: 2.35, filmGrainSat: 0.8,
  filmHalation: 0.21, filmHalThreshold: 0.34, filmHalSoftness: 0.46, filmHalRadius: 1.8, filmHalColor: [1.0, 0.35, 0.08],
  filmWeave: 0.73, filmFlicker: 0.17, filmPrintExposure: -0.21, filmPrintWarmth: 0, filmNegative: false,
};
// GI settings are SHARED across the demo pages (one localStorage store; this scene's
// values above are the canonical defaults). Camera/sun stay per-page.
Object.assign(params, loadGiSettings());

function applyCamera() {
  camera.position.set(params.camX, params.camY, params.camZ);
  controls.target.set(params.targetX, params.targetY, params.targetZ);
}
applyCamera();
window.camera = camera;
window.controls = controls;
window.dumpCamera = () => ({
  camX: +camera.position.x.toFixed(4),
  camY: +camera.position.y.toFixed(4),
  camZ: +camera.position.z.toFixed(4),
  targetX: +controls.target.x.toFixed(4),
  targetY: +controls.target.y.toFixed(4),
  targetZ: +controls.target.z.toFixed(4),
});

const sunVec = new THREE.Vector3();
let gi = null;
const _giSkyZenith = new THREE.Color();
const _giSkyHorizon = new THREE.Color();
const _giSkyGround = new THREE.Color();

function updateGiSky() {
  if (!gi?.setSky) return;
  // Compute-safe sky injection: approximate the sun-free SkyMesh dome as low-frequency
  // SH-9 on the CPU, then the probe kernel reads only 9 vec3 uniforms. No texture
  // sampling, no derivatives, no probe memory. The directional sun remains direct-only.
  const elev = THREE.MathUtils.clamp(params.elevation, 0, 88);
  const sunUp = THREE.MathUtils.clamp(Math.sin(THREE.MathUtils.degToRad(elev)), 0, 1);
  const daylight = Math.sqrt(sunUp);
  const ray = THREE.MathUtils.clamp(params.rayleigh / 8, 0, 1);
  const turb = THREE.MathUtils.clamp(params.turbidity / 20, 0, 1);
  const haze = THREE.MathUtils.clamp((1 - daylight) * 0.65 + turb * 0.35, 0, 1);
  _giSkyZenith.setRGB(0.10 + 0.12 * ray, 0.20 + 0.20 * ray, 0.42 + 0.34 * ray).multiplyScalar(0.18 + 0.62 * daylight);
  _giSkyHorizon.setRGB(0.34 + 0.34 * haze, 0.39 + 0.18 * daylight, 0.48 + 0.24 * daylight).multiplyScalar(0.16 + 0.50 * daylight);
  _giSkyGround.setRGB(0.10, 0.085, 0.065).multiplyScalar(0.06 + 0.16 * daylight);
  gi.setSky({ zenith: _giSkyZenith, horizon: _giSkyHorizon, ground: _giSkyGround });
}

function updateSun() {
  const phi = THREE.MathUtils.degToRad(90 - params.elevation);  // 0 = zenith
  const theta = THREE.MathUtils.degToRad(params.azimuth);
  sunVec.setFromSphericalCoords(1, phi, theta);
  sky.sunPosition.value.copy(sunVec);
  sky.turbidity.value = params.turbidity;
  sky.rayleigh.value = params.rayleigh;
  // place the directional light far along the sun vector, aimed at the scene
  sun.position.copy(sunVec).multiplyScalar(60);
  sun.target.position.set(0, 0, 0);
  sun.intensity = params.sunIntensity;
  // warm the sun as it nears the horizon
  const warm = THREE.MathUtils.clamp(params.elevation / 18, 0, 1);
  sun.color.setRGB(1.0, 0.6 + 0.4 * warm, 0.35 + 0.65 * warm);
  updateGiSky();
  markInteraction();
}

let lastInteractionMs = 0;
const markInteraction = () => { lastInteractionMs = performance.now(); };
controls.addEventListener('change', markInteraction);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  markInteraction();
});

const gui = new GUI({ title: 'SPEEDBALL GI · Sky' });
const fSky = gui.addFolder('Sky / Sun');
fSky.add(params, 'azimuth', 0, 360, 1).name('azimuth°').onChange(updateSun);
fSky.add(params, 'elevation', -3, 88, 0.5).name('elevation°').onChange(updateSun);
fSky.add(params, 'turbidity', 0, 20, 0.1).onChange(updateSun);
fSky.add(params, 'rayleigh', 0, 8, 0.1).onChange(updateSun);
fSky.add(params, 'sunIntensity').min(0).step(0.05).name('sun intensity').onChange(updateSun);   // uncapped
// (the SPEEDBALL GI panel is added after gi is installed below — see addGiPanel)

updateSun();

// The post-rebuild material-recompile pass (the "GI silently missing" footgun) is now
// handled inside installSpeedballGI — no per-app boilerplate needed.

function prepareSponzaMaterialForGi(material) {
  if (!material || material.userData?.powerlightGiPrepared) return;
  material.userData = material.userData || {};
  material.userData.powerlightGiPrepared = true;

  // This Sponza glTF imports with scalar metalness = 1 on stone/fabric surfaces.
  // SPEEDBALL GI intentionally kills diffuse bounce for metals, so normalize the demo
  // asset to dielectric before the spectral scene is packed.
  if (Number.isFinite(material.metalness) && material.metalness > 0.5) {
    material.metalness = 0;
    material.needsUpdate = true;
  }
  if (Number.isFinite(material.roughness) && material.roughness < 0.85) {
    material.roughness = 0.85;
    material.needsUpdate = true;
  }
}

// ── SPEEDBALL GI — install at SETUP, before the first render ────────────────────
// The lights factory MUST be in place before any lit material compiles. Installing
// it after the render loop has started leaves a cached non-GI lights node, and GI
// never folds in (even a later recompile can't swap it). The probe field auto-fits
// and builds once Sponza is in the scene (idle-gated); requestRebuild() nudges it.
gi = installSpeedballGI({
  renderer, scene, camera,
  enabled: params.giEnabled,
  intensity: params.giIntensity,
  divisions: params.giDivisions,
  hysteresis: 0.95,
});
if (!gi.isSupported()) setStatus('SPEEDBALL GI needs WebGPU storage features.', true);
// Push the (shared, possibly restored) settings so the GUI and the GI uniforms agree
// on first paint. Smoothness/denoise stay pinned (no slider, not part of the store).
gi.setSmoothness(1);                       // pinned (no slider)
gi.setFilterStrength(1);   // denoise pinned on (no slider): redundant at these defaults, but harmless
applyGiSettings(gi, params);
updateGiSky();
// The GI panel is SHARED (js/gi_settings.js) — identical controls on every demo page;
// trimming a slider there trims it everywhere. smoothness/denoise stay unexposed.
addGiPanel(gui, gi, params, { onInteract: markInteraction, onStructure: () => updateProbeHelpers() });
gui.add(params, 'exposure').min(0).step(0.01).name('exposure').onChange((v) => { renderer.toneMappingExposure = v; });   // uncapped
gui.onChange(() => saveGiSettings(params));   // persist the SHARED GI settings (GI keys only)
window.gi = gi; // console handle for poking
window.gui = gui;
window.scene = scene; window.renderer = renderer; window.markGiMaterialsDirty = gi.markMaterialsDirty; // diagnostics

// ── PowerShot film emulation (motion-picture negative→print chain) ──────────────
// Runs as a post pass on the tone-mapped, sRGB-encoded scene: pass() → renderOutput()
// gives the display-referred image the film shader expects; outputColorTransform=false
// so the film's own sRGB output is presented verbatim (no double-encode). This is the
// same "effect needs sRGB input" pattern three.js documents for FXAA.
const film = new FilmPipeline(renderer);
applyFilmPreset(film.ctx, FILM_PRESETS[params.filmStock]);
const P = film.ctx.P;
// Tuned baseline overrides. Apply after the stock preset so the initial Sponza look is
// deterministic and the GUI numbers match the shader uniforms.
film.ctx.power.value = params.filmAmount;        // 1.0 = full film, no blend with source
P.exposure.value = params.filmExposure;
P.inputGamma.value = params.filmGamma;           // 1.0 = gamma-correct (scene-linear source)
P.grainStrength.value = params.filmGrain;
P.grainSize.value = params.filmGrainSize;
P.grainSaturation.value = params.filmGrainSat;
P.halStrength.value = params.filmHalation;
P.halThreshold.value = params.filmHalThreshold;
P.halSoftness.value = params.filmHalSoftness;
P.halRadius.value = params.filmHalRadius;
P.halColor.value.fromArray(params.filmHalColor);
P.weave.value = params.filmWeave;
P.flicker.value = params.filmFlicker;
P.printExposure.value = params.filmPrintExposure;
P.printWarmth.value = params.filmPrintWarmth;
P.negativeView.value = params.filmNegative ? 1 : 0;
const post = new THREE.PostProcessing(renderer);
post.outputColorTransform = false;               // film already emits display-encoded sRGB
post.outputNode = filmPass(renderOutput(pass(scene, camera)), film);
window.film = film;

// Every knob below is a point-op uniform → live, no recompile, no hitch.
const fFilm = gui.addFolder('Film (PowerShot)');
const filmCtrls = [];   // preset-backed controllers, refreshed when the stock changes
fFilm.add(params, 'filmEnabled').name('enabled');
fFilm.add(params, 'filmStock', FILM_PRESET_KEYS).name('stock').onChange((v) => {
  applyFilmPreset(film.ctx, FILM_PRESETS[v]);     // rewrites the preset-backed uniforms…
  P.exposure.value = params.filmExposure;         // exposure is a creative override — keep the user's
  P.halColor.value.toArray(params.filmHalColor);  // …pull the stock's characteristics back into the GUI
  params.filmGrain = P.grainStrength.value;
  params.filmGrainSize = P.grainSize.value;
  params.filmGrainSat = P.grainSaturation.value;
  params.filmHalation = P.halStrength.value;
  params.filmHalThreshold = P.halThreshold.value;
  params.filmHalSoftness = P.halSoftness.value;
  params.filmHalRadius = P.halRadius.value;
  params.filmWeave = P.weave.value;
  params.filmFlicker = P.flicker.value;
  filmCtrls.forEach((c) => c.updateDisplay());
});
fFilm.add(params, 'filmAmount', 0, 1, 0.01).name('amount').onChange((v) => { film.ctx.power.value = v; });
fFilm.add(params, 'filmExposure', -3, 3, 0.01).name('exposure (stops)').onChange((v) => { P.exposure.value = v; });
fFilm.add(params, 'filmGamma', 0.4, 1.5, 0.01).name('input gamma').onChange((v) => { P.inputGamma.value = v; });
fFilm.add(params, 'filmNegative').name('negative view').onChange((v) => { P.negativeView.value = v ? 1 : 0; });

const fGrain = fFilm.addFolder('Grain');
filmCtrls.push(fGrain.add(params, 'filmGrain', 0, 2, 0.01).name('strength').onChange((v) => { P.grainStrength.value = v; }));
filmCtrls.push(fGrain.add(params, 'filmGrainSize', 0.5, 4, 0.05).name('size').onChange((v) => { P.grainSize.value = v; }));
filmCtrls.push(fGrain.add(params, 'filmGrainSat', 0, 1, 0.01).name('color spread').onChange((v) => { P.grainSaturation.value = v; }));

const fHal = fFilm.addFolder('Halation');
filmCtrls.push(fHal.add(params, 'filmHalation', 0, 1.5, 0.01).name('strength').onChange((v) => { P.halStrength.value = v; }));
filmCtrls.push(fHal.add(params, 'filmHalThreshold', 0, 1, 0.01).name('threshold').onChange((v) => { P.halThreshold.value = v; }));
filmCtrls.push(fHal.add(params, 'filmHalSoftness', 0, 1, 0.01).name('softness').onChange((v) => { P.halSoftness.value = v; }));
filmCtrls.push(fHal.add(params, 'filmHalRadius', 0.2, 4, 0.05).name('radius').onChange((v) => { P.halRadius.value = v; }));
filmCtrls.push(fHal.addColor(params, 'filmHalColor').name('color').onChange((v) => { P.halColor.value.fromArray(v); }));

const fGate = fFilm.addFolder('Gate / Print');
filmCtrls.push(fGate.add(params, 'filmWeave', 0, 3, 0.01).name('gate weave').onChange((v) => { P.weave.value = v; }));
filmCtrls.push(fGate.add(params, 'filmFlicker', 0, 1, 0.01).name('flicker').onChange((v) => { P.flicker.value = v; }));
fGate.add(params, 'filmPrintExposure', -1, 1, 0.01).name('print exposure').onChange((v) => { P.printExposure.value = v; });
fGate.add(params, 'filmPrintWarmth', -1, 1, 0.01).name('print warmth').onChange((v) => { P.printWarmth.value = v; });

// ── Load Sponza ────────────────────────────────────────────────────────────────
setStatus('loading Sponza…');
new GLTFLoader().load('./Sponza/glTF/Sponza.gltf', (gltf) => {
  const sponza = gltf.scene;
  sponza.traverse((o) => {
    if (!o.isMesh) return;
    o.castShadow = true;
    o.receiveShadow = true;
    if (Array.isArray(o.material)) o.material.forEach(prepareSponzaMaterialForGi);
    else prepareSponzaMaterialForGi(o.material);
  });
  scene.add(sponza);

  // frame the camera to the model and size the shadow camera to its bounds
  const box = new THREE.Box3().setFromObject(sponza);
  const size = box.getSize(new THREE.Vector3());
  const radius = Math.max(size.x, size.y, size.z) * 0.5;
  applyCamera();
  camera.near = radius * 0.01; camera.far = radius * 30; camera.updateProjectionMatrix();
  const sc = sun.shadow.camera;
  sc.left = -radius; sc.right = radius; sc.top = radius; sc.bottom = -radius;
  sc.near = 0.1; sc.far = radius * 8; sc.updateProjectionMatrix();
  sky.scale.setScalar(camera.far * 0.5);

  // model is in the scene now → build the probe field over it.
  gi.requestRebuild();
  hideStatus();
  markInteraction();
}, (xhr) => {
  if (xhr.total) setStatus('loading Sponza… ' + Math.round(xhr.loaded / xhr.total * 100) + '%');
}, (err) => {
  setStatus('Failed to load ./Sponza/glTF/Sponza.gltf\n' + (err?.message || err), true);
});

// ── Render loop ───────────────────────────────────────────────────────────────
// ── Diagnostics: draw the probe field as a grid of spheres ────────────────────
let probeHelperMesh = null, probeHelperSig = '';
const _pgVec = new THREE.Vector3(), _pgMat = new THREE.Matrix4();
// Probe spheres show their REAL captured color: each fragment samples the GI field
// at the sphere surface along its own normal, so a probe reads red near a red wall,
// sky-blue up top, etc. Falls back to a neutral tint until the atlas is bound.
function makeProbeHelperMaterial(lit) {
  if (!lit) return new THREE.MeshBasicMaterial({ color: 0x808080, depthWrite: false, transparent: true, opacity: 0.85, toneMapped: false });
  const n = gi.node;
  const P = positionWorld.add(normalWorld.mul(n.normalBiasNode[0]));
  const mat = new THREE.MeshBasicNodeMaterial({ depthWrite: false, transparent: true, opacity: 0.95 });
  mat.colorNode = n.sampleIrradiance(P, normalWorld, normalWorld).max(0.0);
  return mat;
}
function updateProbeHelpers() {
  if (!params.showProbes) { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  if (!gi || gi.hasData?.() === false || typeof gi.getResolution !== 'function') {
    if (probeHelperMesh) probeHelperMesh.visible = false; return;
  }
  const res = gi.getResolution(); const bounds = gi.getBounds?.();
  if (!res || !bounds) { if (probeHelperMesh) probeHelperMesh.visible = false; return; }
  const rx = Math.max(1, Math.round(res.x)), ry = Math.max(1, Math.round(res.y)), rz = Math.max(1, Math.round(res.z));
  const total = rx * ry * rz;
  const min = bounds.min, size = _pgVec.subVectors(bounds.max, bounds.min);
  const sx = size.x, sy = size.y, sz = size.z;
  const lit = gi.node?.active === true;   // atlas bound → can show each probe's real captured color
  const sig = `${rx},${ry},${rz}|${min.x.toFixed(2)},${min.y.toFixed(2)},${min.z.toFixed(2)}|${sx.toFixed(2)},${sy.toFixed(2)},${sz.toFixed(2)}|${lit ? 1 : 0}`;
  if (sig === probeHelperSig && probeHelperMesh) { probeHelperMesh.visible = true; return; }
  probeHelperSig = sig;
  if (!probeHelperMesh || probeHelperMesh.count !== total || probeHelperMesh._lit !== lit) {
    if (probeHelperMesh) { scene.remove(probeHelperMesh); probeHelperMesh.geometry.dispose(); probeHelperMesh.material.dispose(); }
    const cell = Math.max(sx / Math.max(1, rx - 1), sy / Math.max(1, ry - 1), sz / Math.max(1, rz - 1));
    const geo = new THREE.SphereGeometry(cell * 0.08 + 1e-3, 8, 6);
    const mat = makeProbeHelperMaterial(lit);
    probeHelperMesh = new THREE.InstancedMesh(geo, mat, total);
    probeHelperMesh._lit = lit;
    probeHelperMesh.frustumCulled = false;
    probeHelperMesh.renderOrder = 9999;
    probeHelperMesh.userData.maxjsVisible = false; // keep probe spheres OUT of the GI BVH
    scene.add(probeHelperMesh);
  }
  let idx = 0;
  for (let k = 0; k < rz; k++) for (let j = 0; j < ry; j++) for (let i = 0; i < rx; i++) {
    const fx = rx > 1 ? i / (rx - 1) : 0, fy = ry > 1 ? j / (ry - 1) : 0, fz = rz > 1 ? k / (rz - 1) : 0;
    _pgMat.makeTranslation(min.x + fx * sx, min.y + fy * sy, min.z + fz * sz);
    probeHelperMesh.setMatrixAt(idx++, _pgMat);
  }
  probeHelperMesh.instanceMatrix.needsUpdate = true;
  probeHelperMesh.visible = true;
}

renderer.setAnimationLoop((nowMs) => {
  controls.update();
  // SPEEDBALL GI self-gates on idle: the BVH build + GPU solve are held while orbiting
  // or dragging a slider (world-space GI is lossless held static), then converge
  // once the view rests — so a frame hitch can never land mid-interaction.
  gi?.update({ playing: false });   // idle-gated solve (camera-rest detection is built in)
  updateProbeHelpers();
  if (params.filmEnabled) post.render();          // PowerShot film post-chain
  else renderer.render(scene, camera);
});
</script>
</body>
</html>
